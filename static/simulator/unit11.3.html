<!DOCTYPE html>

<style>
html,body{
    margin:0;
    background:#081018;
    color:white;
    font-family:Inter,sans-serif;

}

#layout{
    display:flex;
    flex-direction:column;

}

#viewer{

    height:58vh;

#panel{

.row{
    display:flex;
    gap:16px;
    flex-wrap:wrap;
}

.card{

    border:1px solid rgba(255,255,255,.08);

.big{

}

.blue{

.fill{

.tileButtons{

.tileBtn{

}

.success{
    position:absolute;

    right:20px;

    color:#86efac;

    z-index:10;
}

.success.show{

}

.resultIcon{
    position:absolute;
    left:20px;
    top:20px;
    font-size:28px;
    z-index:20;
}

.resultIcon.red{
    color:#ef4444;
}

.resultIcon.blue{
    color:#60a5fa;
}

.resultIcon.unknown{
    color:#9ca3af;
}
</style>
</head>

<body>

<script>
(() => {

"use strict";

const starterCode = `@TeleOp(name="Alliance_Detection")
public class AllianceDetection extends OpMode {

    ColorSensor colorSensor;

    @Override
    public void init() {
        colorSensor = hardwareMap.get(ColorSensor.class, "colorSensor");
        telemetry.addData("Status", "Initialized");
    }

    String detectAlliance() {
        int red  = 0;
        int blue = 0;

        // TODO: read both color channels and return the dominant alliance.
        return "UNKNOWN";
    }

    @Override
    public void loop() {
        String alliance = detectAlliance();

        telemetry.addData("Alliance", alliance);
        telemetry.addData("Red",      colorSensor.red());
        telemetry.addData("Blue",     colorSensor.blue());
        telemetry.addData("Green",    colorSensor.green());
        telemetry.update();
    }
}`;

const sim = {

    running:false,

    r:30,
    g:30,
    b:255,

    result:"UNKNOWN",

	validations:{
	    red:false,
	    blue:false,
	    compare:false,
	    returnRed:false,
	    returnBlue:false,
	    unknown:false,
	    telemetry:false
	}
};

let scene;
let camera;
let renderer;
let robot;
let sensorGlow;
let beam;

function clamp(v,min,max){
    return Math.max(min,Math.min(max,v));
}

function getTileX(){
    if(sim.r > sim.b && sim.r > sim.g){
        return -5;
    }

    if(sim.b > sim.r && sim.b > sim.g){
        return -2.5;
    }

    if(sim.g > sim.r && sim.g > sim.b){
        return 5;
    }

    if(
        sim.r > 160 &&
        sim.g > 160 &&
        sim.b > 160
    ){
        return 0;
    }

    return 2.5;
}

function updateRequirementStates(){
    if(!window.setRequirement){
        return;
    }

    [
        sim.validations.red,
        sim.validations.blue,
        sim.validations.compare,
        sim.validations.returnRed,
        sim.validations.returnBlue,
        sim.validations.unknown,
        sim.validations.telemetry
    ].forEach((passed,index)=>{
        setRequirement(index,passed);
    });
}

                </div>

                    "

                </div>

                <div class="logic" id="logic1"></div>
                <div class="logic" id="logic2"></div>
                <div class="logic" id="logic3"></div>
            </div>

            <div class="card">
                <div class="barWrap">
                    <div class="barLabel">
                        RED: <span id="redVal">0</span>
                    </div>
                    <div class="bar">
                        <div id="redFill"
                             class="fill red"></div>
                    </div>
                </div>

                <div class="barWrap">
                    <div class="barLabel">
                        GREEN: <span id="greenVal">0</span>
                    </div>
                    <div class="bar">
                        <div id="greenFill"
                             class="fill green"></div>
                    </div>
                </div>

                <div class="barWrap">
                    <div class="barLabel">
                        BLUE: <span id="blueVal">0</span>
                    </div>
                    <div class="bar">
                        <div id="blueFill"
                             class="fill blue"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="margin-top:0;">
                    Custom RGB Test
                </h3>

                <div class="sliderRow">
                    <label>Red</label>
                    <input id="rSlider"
                           type="range"
                           min="0"
                           max="255"
                           value="30">
                </div>

                <div class="sliderRow">
                    <label>Green</label>
                    <input id="gSlider"
                           type="range"
                           min="0"
                           max="255"
                           value="30">
                </div>

                <div class="sliderRow">
                    <label>Blue</label>
                    <input id="bSlider"
                           type="range"
                           min="0"
                           max="255"
                           value="255">
                </div>

                <div class="tileButtons">
                    <button class="tileBtn"
                            style="background:#dc2626"
                            onclick="setTile(255,30,30)">
                        Red Tile

                            style="background:#2563eb"

                    </button>

                    <button class="tileBtn"
                            style="background:#d1d5db;color:black"
                            onclick="setTile(200,200,200)">
                        White Tape
                    </button>

                    <button class="tileBtn"
                            style="background:#4b5563"
                            onclick="setTile(80,80,80)">
                        Grey Field
                    </button>

                    <button class="tileBtn"

    right.appendChild(panel);

    const sceneContainer =

            sceneContainer.appendChild(icon);

function buildThreeScene(){

    requestAnimationFrame(() => {

    if(
        !window.THREE ||
        !window.scene
    ){

        console.error(
            "THREE.js missing"
        );

        return;
    }

    const THREE =
        window.THREE;

    scene =
        window.scene;

    const oldRoot =
        scene.getObjectByName(
            "alliance-color-root"
        );

    if(oldRoot){
        scene.remove(oldRoot);
    }

    const root =
        new THREE.Group();

    root.name =
        "alliance-color-root";

    scene.background =
        new THREE.Color(0x081018);

    if(window.setFieldVisible){
        window.setFieldVisible(false);
    }

    if(window.setCameraOrbit){
        window.setCameraOrbit({
            theta:.42,
            phi:1.02,
            radius:7.2,
            target:{
                x:0,
                y:.25,
                z:0
            }
        });
    }

    const ambient =
        new THREE.AmbientLight(
            0xffffff,
            1.1
        );

    root.add(ambient);

    const light =
        new THREE.DirectionalLight(
            0xffffff,
            1.8
        );

    light.position.set(
        5,
        10,
        5
    );

    root.add(light);

    const floor =
        new THREE.Mesh(
            new THREE.PlaneGeometry(
                11,
                6.5
            ),
            new THREE.MeshStandardMaterial({
                color:0x0b1324,
                metalness:.35,
                roughness:.55
            })
        );

    floor.rotation.x =
        -Math.PI / 2;

    floor.position.y =
        -.03;

    root.add(floor);

    const colors = [
        0xff2222,
        0x2255ff,
        0xffffff,
        0x666666,
        0x22cc55
	    ];

    for(let i=0;i<5;i++){

        const tile =
            new THREE.Mesh(
                new THREE.BoxGeometry(
                    2.2,
                    .2,
                    2.2
                ),
                new THREE.MeshStandardMaterial({
                    color:colors[i],
                    metalness:.2,
                    roughness:.7
                })
            );

	        tile.position.set(
	            -5 + i * 2.5,
	            0,
	            0
	        );

	        root.add(tile);
	    }

	    robot =
	        new THREE.Mesh(
            new THREE.BoxGeometry(
                1.4,
                .5,
                1.4
            ),
            new THREE.MeshStandardMaterial({
                color:0x9ca3af,
                metalness:.8,
                roughness:.3
            })
        );

	    robot.position.set(
	        -2.5,
	        .5,
	        0
	    );

	    root.add(robot);

    sensorGlow =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                .35,
                .35,
                .08,
                32
            ),
            new THREE.MeshBasicMaterial({
                color:0xffffff
            })
        );

    sensorGlow.position.set(
        0,
        -.3,
        0
    );

    robot.add(sensorGlow);

    beam =
        new THREE.Mesh(
            new THREE.CylinderGeometry(
                .08,
                .08,
                .7,
                16
            ),
            new THREE.MeshBasicMaterial({
                color:0xffffff,
                transparent:true,
                opacity:.5
            })
        );

    beam.position.set(
        0,
        -.6,
        0
    );

	    robot.add(beam);

	    scene.add(root);

        updateUI();

    });
}

function animate(){

    requestAnimationFrame(
        animate
    );

    if(renderer){

        renderer.render(
            scene,
            camera
        );
    }
}

function updateUI(){

    const redVal =
        document.getElementById(
            "redVal"
        );

    const greenVal =
        document.getElementById(
            "greenVal"
        );

    const blueVal =
        document.getElementById(
            "blueVal"
        );

    const redFill =
        document.getElementById(
            "redFill"
        );

    const greenFill =
        document.getElementById(
            "greenFill"
        );

    const blueFill =
        document.getElementById(
            "blueFill"
        );

    const preview =
        document.getElementById(
            "colorPreview"
        );

    const resultEl =
        document.getElementById(
            "allianceText"
        );

    const logic1 =
        document.getElementById(
            "logic1"
        );

    const logic2 =
        document.getElementById(
            "logic2"
        );

    const logic3 =
        document.getElementById(
            "logic3"
        );

    if(
        !redVal ||
        !greenVal ||
        !blueVal ||
        !redFill ||
        !greenFill ||
        !blueFill ||
        !preview ||
        !resultEl ||
        !logic1 ||
        !logic2 ||
        !logic3
    ){
        return;
    }

    redVal.textContent = sim.r;

    greenVal.textContent = sim.g;

    blueVal.textContent = sim.b;

    redFill.style.width =
        `${sim.r / 255 * 100}%`;

    greenFill.style.width =
        `${sim.g / 255 * 100}%`;

    blueFill.style.width =
        `${sim.b / 255 * 100}%`;

    preview.style.background =
        `rgb(${sim.r},${sim.g},${sim.b})`;

    resultEl.textContent =
        sim.result;

    resultEl.className =
        `big ${sim.result.toLowerCase()}`;

    logic1.textContent =
        `red (${sim.r}) > blue (${sim.b}) -> ${sim.r > sim.b}`;

    logic2.textContent =
        `blue (${sim.b}) > red (${sim.r}) -> ${sim.b > sim.r}`;

    logic3.textContent =
        `Result -> ${sim.result}`;

    const icon =
        document.getElementById(
            "resultIcon"
        );

    if(!icon){
        return;
    }

    if(sim.result === "RED"){

        icon.className =
            "resultIcon red";

        icon.innerHTML =
            '<i class="fa-solid fa-flag"></i>';

    }else if(
        sim.result === "BLUE"
    ){

        icon.className =
            "resultIcon blue";

        icon.innerHTML =
            '<i class="fa-solid fa-flag"></i>';

    }else{

        icon.className =
            "resultIcon unknown";

        icon.innerHTML =
            '<i class="fa-solid fa-circle-question"></i>';
    }

    if(sensorGlow){

        const c =
            new window.THREE.Color(
                `rgb(${sim.r},${sim.g},${sim.b})`
            );

        sensorGlow.material.color.copy(c);

        beam.material.color.copy(c);

        robot.position.x +=
            (getTileX() - robot.position.x) * .35;

        if(sim.result === "RED"){

            robot.material.color.set(
                0xaa4444
            );

        }else if(
            sim.result === "BLUE"
        ){

            robot.material.color.set(
                0x4466cc
            );

        }else{

            robot.material.color.set(
                0x9ca3af
            );
        }
    }

    const success =
        Object.values(
            sim.validations
        ).every(Boolean);

    const successEl =
        document.getElementById(
            "success"
        );

    if(successEl){
        successEl.classList.toggle(
            "show",
            success
        );
    }

    updateRequirementStates();
}

function setTile(r,g,b){

    sim.r = r;
    sim.g = g;
    sim.b = b;

    document.getElementById(
        "rSlider"
    ).value = r;

    document.getElementById(
        "gSlider"
    ).value = g;

    document.getElementById(
        "bSlider"
    ).value = b;

    updateUI();
}

window.setTile =
    setTile;

function installMocks(){

    window.getColorRed =
        () => sim.r;

    window.getColorGreen =
        () => sim.g;

    window.getColorBlue =
        () => sim.b;
}

function transpile(code){

    return code

        .replace(
            /\b(double|int|boolean|String|float|long|byte|short|char)\s+(?=[A-Za-z_$])/g,
            "let "
        )

        .replace(
            /\b(ColorSensor|NormalizedColorSensor)\s+(?=[A-Za-z_$])/g,
            "let "
        )

        .replace(
            /\bhardwareMap\s*\.\s*get\s*\(\s*(\w+)\.class\s*,/g,
            'hardwareMap.get("$1",'
        )

        .replace(
            /\bcolorSensor\s*\.\s*red\s*\(\s*\)/g,
            'getColorRed("colorSensor")'
        )

        .replace(
            /\bcolorSensor\s*\.\s*green\s*\(\s*\)/g,
            'getColorGreen("colorSensor")'
        )

        .replace(
            /\bcolorSensor\s*\.\s*blue\s*\(\s*\)/g,
            'getColorBlue("colorSensor")'
        )

        .replace(
            /\btelemetry\s*\.\s*addData\s*\(/g,
            "addTelemetry("
        )

        .replace(
            /\btelemetry\s*\.\s*update\s*\(\s*\)/g,
            "updateTelemetry()"
        )

        .replace(
            /\btelemetry\s*\.\s*clear\s*\(\s*\)/g,
            "clearTelemetry()"
        );
}

function extractMethod(code,name){

    const re =
        new RegExp(
            "(?:public\\s+|private\\s+|protected\\s+)?" +
            "(?:static\\s+)?" +
            "(?:void|boolean|double|int|float|String)\\s+" +
            name +
            "\\s*\\([^)]*\\)\\s*\\{"
        );

    const match =
        re.exec(code);

    if(!match)
        return "";

    const start =
        match.index +
        match[0].length -
        1;

    let depth = 1;

    let i = start + 1;

    while(
        i < code.length &&
        depth > 0
    ){

        if(code[i] === "{")
            depth++;

        if(code[i] === "}")
            depth--;

        i++;
    }

    return code.slice(
        start + 1,
        i - 1
    );
}

window.onSimulatorReady =
function(){

    setCode(starterCode);

    setChallenge(
        "Alliance Color Detection with Color Sensor",
        "Use red and blue color channels to determine alliance color.",
        [
            "Read red channel",
            "Read blue channel",
            "Compare channels",
            "Return RED",
            "Return BLUE",
            "Return UNKNOWN",
            "Show telemetry"
        ]
    );

    setHeader(
        "Telemark Unit 11.3 Simulator",
        "Alliance Color Detection with Color Sensor"
    );

    setBadges([
        {
            iconClass:"fa-solid fa-eye-dropper",
            label:"ColorSensor",
            active:true
        },
        {
            iconClass:"fa-solid fa-display",
            label:"Telemetry",
            active:true
        }
    ]);

    setActiveInputs([]);

    if(window.hardwareMap?.registerColorSensor){
        hardwareMap.registerColorSensor(
            "colorSensor"
        );
    }

    createPanel();

    buildThreeScene();

    updateUI();

    function bindSlider(id,key){
        const slider =
            document.getElementById(id);

        if(!slider){
            return;
        }

        slider.addEventListener(
            "input",
            e => {
                sim[key] =
                    +e.target.value;

                updateUI();
            }
        );
    }

    bindSlider("rSlider","r");
    bindSlider("gSlider","g");
    bindSlider("bSlider","b");
};

window.onRun = function(){

    sim.running = true;

    installMocks();

    if(window.clearTelemetry){
        clearTelemetry();
    }

    const editor =
        document.getElementById(
            "sim-code-editor"
        );

    const source =
        editor?.value ||
        starterCode;

    const js =
        transpile(source);

    sim.validations.red =
        js.includes(
            'getColorRed("colorSensor")'
        );

    sim.validations.blue =
        js.includes(
            'getColorBlue("colorSensor")'
        );

    sim.validations.compare =
        /red\s*>\s*blue|blue\s*>\s*red|getColorRed\("colorSensor"\)\s*>\s*getColorBlue\("colorSensor"\)|getColorBlue\("colorSensor"\)\s*>\s*getColorRed\("colorSensor"\)/.test(js);

    sim.validations.returnRed =
        /return\s+"RED"\s*;/.test(source);

    sim.validations.returnBlue =
        /return\s+"BLUE"\s*;/.test(source);

    sim.validations.unknown =
        /return\s+"UNKNOWN"\s*;/.test(source);

    sim.validations.telemetry =
        /telemetry\s*\.\s*addData\s*\(/.test(source) &&
        /telemetry\s*\.\s*update\s*\(\s*\)/.test(source);

    updateRequirementStates();

    const rawLoopBody =
        extractMethod(source,"loop");

    const rawDetectBody =
        extractMethod(
            source,
            "detectAlliance"
        );

    const loopBody =
        transpile(rawLoopBody);

    const detectBody =
        transpile(rawDetectBody);

    try{

        if(!loopBody || !detectBody){
            throw new Error(
                "Missing loop() or detectAlliance() method"
            );
        }

        const detectFn =
            new Function(
                detectBody
            );

        const loopFn =
            new Function(
                `
                const detectAlliance = arguments[0];
                ${loopBody}
                `
            );

        function tick(){

            if(!sim.running)
                return;

            try{

                if(window.clearTelemetry){
                    clearTelemetry();
                }

                sim.result =
                    detectFn();

                loopFn(detectFn);

            }catch(err){

                console.error(err);

                if(window._simShowTelemetryError){
                    _simShowTelemetryError(
                        "Runtime error: " +
                        err.message
                    );
                }

                sim.running = false;

                if(window.stopExecution){
                    stopExecution();
                }
            }

            updateUI();

            setTimeout(
                tick,
                50
            );
        }

        tick();

    }catch(err){

        console.error(err);

        if(window._simShowTelemetryError){
            _simShowTelemetryError(
                "ERROR: " +
                err.message
            );
        }

        sim.running = false;

        if(window.stopExecution){
            stopExecution();
        }
    }
};

window.onStop = function(){

    sim.running = false;
};

window.onReset = function(){

    sim.running = false;

    setTile(30,30,255);

    sim.result =
        "UNKNOWN";

    updateUI();
};

})();
</script>
