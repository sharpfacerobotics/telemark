<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Telemark Unit 15.5 Simulator</title>
<style>
  #sim-right-panel #sim-scene-container {
    flex: 1 0 clamp(390px, 56vh, 660px);
    min-height: 390px;
    background: #020204;
  }

  #sim-right-panel .u155-panel {
    flex: 0 1 auto;
    min-height: 0;
    max-height: clamp(300px, 38vh, 500px);
    overflow-y: auto;
    margin: 10px;
    padding: 12px;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    background: #0b0b0f;
    color: #e5e7eb;
    font-family: var(--font-ui, Arial, sans-serif);
  }

  #sim-scene-container .u155-badge,
  #sim-scene-container .u155-score-badge,
  #sim-scene-container .u155-stuck-badge,
  #sim-scene-container .u155-diagram {
    position: absolute;
    z-index: 5;
    border: 1px solid rgba(243, 234, 215, 0.34);
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.88);
    color: #f3ead7;
    font-weight: 800;
    pointer-events: none;
    box-shadow: 0 0 18px rgba(243, 234, 215, 0.08);
  }

  #sim-scene-container .u155-badge {
    top: 12px;
    left: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 11px;
  }

  #sim-scene-container .u155-score-badge {
    left: 12px;
    bottom: 12px;
    display: none;
    padding: 9px 12px;
  }

  #sim-scene-container .u155-stuck-badge {
    right: 12px;
    bottom: 12px;
    display: none;
    padding: 9px 12px;
    color: #d8c7a5;
    border-color: rgba(216, 199, 165, 0.54);
  }

  #sim-scene-container .u155-diagram {
    top: 12px;
    right: 12px;
    width: min(300px, 42%);
    padding: 10px;
  }

  #sim-scene-container .u155-diagram-title,
  #sim-right-panel .u155-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 800;
  }

  #sim-scene-container .u155-diagram-title {
    margin-bottom: 8px;
  }

  #sim-scene-container .u155-flow {
    display: grid;
    gap: 7px;
  }

  #sim-scene-container .u155-state-node,
  #sim-scene-container .u155-arrow-node {
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    background: #08080c;
    color: #8f8778;
    padding: 7px;
    font-size: 0.75rem;
  }

  #sim-scene-container .u155-state-node.active {
    color: #f3ead7;
    border-color: #f3ead7;
    box-shadow: 0 0 14px rgba(243, 234, 215, 0.22);
  }

  #sim-scene-container .u155-state-node.done,
  #sim-scene-container .u155-arrow-node.pulse {
    color: #d8c7a5;
    border-color: #d8c7a5;
  }

  #sim-scene-container .u155-state-node.stuck {
    color: #d8c7a5;
    border-color: #8f8778;
    box-shadow: 0 0 16px rgba(216, 199, 165, 0.22);
  }

  #sim-right-panel .u155-title {
    margin: 12px 0 8px;
  }

  #sim-right-panel .u155-title:first-child {
    margin-top: 0;
  }

  #sim-right-panel .u155-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  #sim-right-panel .u155-card,
  #sim-right-panel .u155-step {
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    background: #08080c;
    color: #9ca3af;
    padding: 9px;
    font-size: 0.82rem;
    line-height: 1.35;
  }

  #sim-right-panel .u155-card strong {
    color: #f4f4f5;
    font-size: 1.08rem;
  }

  #sim-right-panel .u155-card.large strong {
    font-size: 1.35rem;
  }

  #sim-right-panel .u155-card.good,
  #sim-right-panel .u155-step.good {
    border-color: #22cc66;
    color: #bbf7d0;
    box-shadow: 0 0 12px rgba(34, 204, 102, 0.1);
  }

  #sim-right-panel .u155-card.warn,
  #sim-right-panel .u155-step.warn {
    border-color: #8a6a20;
    color: #fde68a;
  }

  #sim-right-panel .u155-card.bad,
  #sim-right-panel .u155-step.bad {
    border-color: #7f1d1d;
    color: #fecaca;
  }

  #sim-right-panel .u155-bar {
    height: 10px;
    margin-top: 6px;
    border-radius: 999px;
    background: #15151c;
    overflow: hidden;
    border: 1px solid #2a2a3a;
  }

  #sim-right-panel .u155-fill {
    height: 100%;
    width: 0%;
    background: #f3ead7;
  }

  #sim-right-panel .u155-timeline {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  #sim-right-panel .u155-warning,
  #sim-right-panel .u155-success,
  #sim-right-panel .u155-callout {
    margin-top: 10px;
    border-radius: 8px;
    padding: 9px;
    font-size: 0.82rem;
    line-height: 1.35;
  }

  #sim-right-panel .u155-callout {
    border: 1px solid #374151;
    background: rgba(244, 244, 245, 0.05);
    color: #e5e7eb;
  }

  #sim-right-panel .u155-warning {
    display: none;
    border: 1px solid #8a6a20;
    background: rgba(255, 204, 102, 0.08);
    color: #fde68a;
  }

  #sim-right-panel .u155-warning.error {
    border-color: #7f1d1d;
    background: rgba(239, 68, 68, 0.1);
    color: #fecaca;
  }

  #sim-right-panel .u155-success {
    display: none;
    align-items: center;
    gap: 8px;
    border: 1px solid #22cc66;
    background: rgba(34, 204, 102, 0.1);
    color: #22cc66;
    font-weight: 800;
  }
</style>
<script src="./simulator_base.js"></script>
</head>
<body>
<script>
window.onSimulatorReady = function () {
  "use strict";

  const starterCode = `import com.pedropathing.follower.Follower;
import com.pedropathing.localization.Pose;
import com.pedropathing.pathgen.BezierLine;
import com.pedropathing.pathgen.Path;
import com.pedropathing.pathgen.PathChain;
import com.pedropathing.pathgen.Point;
import com.qualcomm.robotcore.eventloop.opmode.Autonomous;
import com.qualcomm.robotcore.eventloop.opmode.LinearOpMode;
import com.qualcomm.robotcore.hardware.Servo;

@Autonomous(name="State_Machine")
public class StateMachine extends LinearOpMode {

    enum State { DRIVE_TO_TARGET, DELIVER, DONE }

    Follower  follower;
    Servo     claw;
    PathChain scoringPath;

    static final double CLAW_OPEN   = 0.1;
    static final double CLAW_CLOSED = 0.9;

    double deliverTimer = 0;

    @Override
    public void runOpMode() {

        follower = new Follower(hardwareMap);
        claw     = hardwareMap.get(Servo.class, "claw");

        follower.setStartingPose(new Pose(8, 60, 0));

        scoringPath = follower.pathBuilder()
            .addPath(
                new Path(new BezierLine(
                    new Point(8,   60,  Point.CARTESIAN),
                    new Point(120, 120, Point.CARTESIAN)
                ))
            )
            .build();

        // TODO: Close the claw before start

        telemetry.addData("Status", "Ready");
        telemetry.update();

        waitForStart();

        follower.followPathChain(scoringPath);

        State currentState = State.DRIVE_TO_TARGET;

        while (opModeIsActive() && currentState != State.DONE) {
            follower.update();

            switch (currentState) {
                case DRIVE_TO_TARGET:
                    if (!follower.isBusy()) {
                        // TODO: Open the claw, store deliverTimer, and switch to DELIVER
                    }
                    break;

                case DELIVER:
                    // TODO: After 0.5 seconds, switch to DONE
                    break;

                case DONE:
                    break;
            }

            Pose pose = follower.getPose();
            telemetry.addData("State",   currentState);
            telemetry.addData("X",       pose.getX());
            telemetry.addData("Y",       pose.getY());
            telemetry.addData("Heading", pose.getHeading());
            telemetry.update();
        }

        telemetry.addData("Status", "COMPLETE");
        telemetry.update();
    }
}`;

  const requirements = [
    "State enum has DRIVE_TO_TARGET, DELIVER, and DONE",
    "Call follower.followPathChain() to start driving",
    "Use !follower.isBusy() to transition to DELIVER",
    "Open the claw with CLAW_OPEN on DELIVER transition",
    "Set deliverTimer = getRuntime() when entering DELIVER",
    "Use getRuntime() - deliverTimer >= 0.5 to transition to DONE",
    "Exit the loop when state is DONE",
    "Call follower.update() every iteration",
    "Use opModeIsActive() in the while condition",
    "Show final COMPLETE telemetry"
  ];

  const FIELD_INCHES = 144;
  const FIELD_SCALE = 0.047;
  const START_POSE = { x: 8, y: 60, heading: 0 };
  const TARGET_POSE = { x: 120, y: 120, heading: 0 };
  const CLAW_OPEN = 0.1;
  const CLAW_CLOSED = 0.9;

  const state = {
    runToken: 0,
    active: false,
    stopRequested: false,
    waitingForStart: false,
    startRequested: false,
    _resolveStart: null,
    phase: "NOT INITIALIZED",
    currentState: "INIT",
    visited: {},
    history: [],
    pose: { x: START_POSE.x, y: START_POSE.y, heading: START_POSE.heading },
    startPose: { x: START_POSE.x, y: START_POSE.y, heading: START_POSE.heading },
    path: null,
    pathProgress: 0,
    followerBusy: false,
    clawPosition: CLAW_CLOSED,
    deliverTimer: 0,
    deliverElapsed: 0,
    correctedDeliverStart: 0,
    lastTransition: "",
    transitionPulse: 0,
    scored: false,
    stuck: false,
    completed: false,
    analysis: null,
    lastError: "",
    runtimeStart: 0,
    finalTelemetry: false
  };

  let followerDevice;
  let clawDevice;
  let sceneRoot;
  let robotGroup;
  let clawLeft;
  let clawRight;
  let gameElement;
  let scoreZone;
  let pathLine;
  let progressLine;
  let timerRing;
  let transitionFlash;
  let animationRegistered = false;
  const followerCallbacks = [];

  function el(id) {
    return document.getElementById(id);
  }

  function safeCall(fn) {
    if (typeof fn !== "function") return undefined;
    const args = Array.prototype.slice.call(arguments, 1);
    return fn.apply(null, args);
  }

  ensureHardware();

  setCode(starterCode);
  setChallenge(
    "Telemark Unit 15.5 Simulator",
    "Autonomous State Machine with Pedro Pathing and Claw",
    requirements
  );
  setBadges([
    { icon: "fa-route", iconClass: "fa-solid fa-route", label: "PedroPathing", active: true },
    { icon: "fa-diagram-project", iconClass: "fa-solid fa-diagram-project", label: "StateMachine", active: true },
    { icon: "fa-hand", iconClass: "fa-solid fa-hand", label: "Claw", active: true },
    { icon: "fa-clock", iconClass: "fa-solid fa-clock", label: "Timer", active: true },
    { icon: "fa-display", iconClass: "fa-solid fa-display", label: "Telemetry", active: true }
  ]);
  setActiveInputs([]);

  const banner = el("sim-success-banner");
  if (banner) {
    banner.innerHTML = '<i class="fa-solid fa-circle-check"></i> Challenge Complete! Autonomous state machine executes correctly from DRIVE_TO_TARGET through DELIVER to DONE.';
  }

  followerDevice = hardwareMap.registerFollower("follower");
  clawDevice = hardwareMap.registerServo("claw");
  hardwareMap.onFollowerUpdate(function (x, y, heading) {
    updateRobotPose(x, y, heading);
  });
  hardwareMap.onServoPosition(function (name, value) {
    updateClawVisual(name, value);
  });

  createPanel();
  setupScene();
  resetSimulationState();
  validateCode();
  updatePanel();

  window.onInit = function () {
    state.runToken += 1;
    state.active = true;
    state.stopRequested = false;
    state.startRequested = false;
    state.waitingForStart = false;
    resetSimulationState();
    state.phase = "INITIALIZING";
    validateCode();
    runLinearOpMode(state.runToken);
  };

  window.onStart = function () {
    state.startRequested = true;
    releaseWaitForStart();
  };

  window.onRun = window.onInit;

  window.onStop = function () {
    state.stopRequested = true;
    state.active = false;
    state.waitingForStart = false;
    state.phase = "STOPPED";
    releaseWaitForStart();
    updatePanel();
  };

  window.onReset = function () {
    state.runToken += 1;
    state.active = false;
    state.stopRequested = false;
    state.startRequested = false;
    state.waitingForStart = false;
    resetSimulationState();
    safeCall(clearTelemetry);
    validateCode();
    updatePanel();
  };

  if (!animationRegistered && typeof addAnimationCallback === "function") {
    addAnimationCallback(tick);
    animationRegistered = true;
  }

  function ensureHardware() {
    if (typeof hardwareMap.registerFollower !== "function") {
      hardwareMap.registerFollower = function (name) {
        const device = {
          _name: name,
          pathBuilder: function () { return getPathBuilder(); },
          setStartingPose: function (pose) { setFollowerStartPose(pose); },
          followPathChain: function (chain) { followPathChain(chain); },
          update: function () { updateFollower(); },
          isBusy: function () { return isFollowerBusy(); },
          getPose: function () { return getFollowerPose(); }
        };
        hardwareMap._devices[name] = device;
        return device;
      };
    }

    if (typeof hardwareMap.onFollowerUpdate !== "function") {
      hardwareMap.onFollowerUpdate = function (cb) { followerCallbacks.push(cb); };
    } else {
      const original = hardwareMap.onFollowerUpdate.bind(hardwareMap);
      hardwareMap.onFollowerUpdate = function (cb) {
        followerCallbacks.push(cb);
        original(cb);
      };
    }
  }

  function createPanel() {
    const rightPanel = el("sim-right-panel");
    const sceneContainer = el("sim-scene-container");
    if (!rightPanel || !sceneContainer) return;

    ["u155-panel", "u155-scene-badge", "u155-score-badge", "u155-stuck-badge", "u155-diagram"].forEach(function (id) {
      const old = el(id);
      if (old) old.remove();
    });

    const sceneBadge = document.createElement("div");
    sceneBadge.id = "u155-scene-badge";
    sceneBadge.className = "u155-badge";
    sceneContainer.appendChild(sceneBadge);

    const scoreBadge = document.createElement("div");
    scoreBadge.id = "u155-score-badge";
    scoreBadge.className = "u155-score-badge";
    scoreBadge.innerHTML = '<i class="fa-solid fa-circle-check"></i> SCORED';
    sceneContainer.appendChild(scoreBadge);

    const stuckBadge = document.createElement("div");
    stuckBadge.id = "u155-stuck-badge";
    stuckBadge.className = "u155-stuck-badge";
    stuckBadge.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> STUCK';
    sceneContainer.appendChild(stuckBadge);

    const diagram = document.createElement("div");
    diagram.id = "u155-diagram";
    diagram.className = "u155-diagram";
    diagram.innerHTML = `
      <div class="u155-diagram-title"><i class="fa-solid fa-diagram-project"></i> State Machine</div>
      <div class="u155-flow">
        <div class="u155-state-node" id="u155-node-drive">DRIVE_TO_TARGET</div>
        <div class="u155-arrow-node" id="u155-arrow-drive">!follower.isBusy()</div>
        <div class="u155-state-node" id="u155-node-deliver">DELIVER</div>
        <div class="u155-arrow-node" id="u155-arrow-deliver">runtime - timer &gt;= 0.5s</div>
        <div class="u155-state-node" id="u155-node-done">DONE</div>
      </div>
    `;
    sceneContainer.appendChild(diagram);

    const panel = document.createElement("div");
    panel.id = "u155-panel";
    panel.className = "u155-panel";
    panel.innerHTML = `
      <div class="u155-title"><i class="fa-solid fa-location-arrow"></i> Current State</div>
      <div class="u155-grid">
        <div class="u155-card large" id="u155-state-card"></div>
        <div class="u155-card large" id="u155-claw-card"></div>
        <div class="u155-card" id="u155-pose-card"></div>
        <div class="u155-card" id="u155-progress-card"></div>
      </div>

      <div class="u155-title"><i class="fa-solid fa-code-branch"></i> Transition Conditions</div>
      <div class="u155-grid">
        <div class="u155-card" id="u155-busy-card"></div>
        <div class="u155-card" id="u155-timer-card"></div>
      </div>

      <div class="u155-title"><i class="fa-solid fa-clock-rotate-left"></i> State History</div>
      <div class="u155-timeline" id="u155-history"></div>

      <div class="u155-title"><i class="fa-solid fa-stopwatch"></i> Deliver Timer</div>
      <div class="u155-card" id="u155-deliver-bar"></div>

      <div class="u155-callout">
        <i class="fa-solid fa-circle-info"></i>
        The robot should drive first, open the claw exactly when the path completes, wait 0.5 seconds, then exit cleanly.
      </div>
      <div class="u155-success" id="u155-success"><i class="fa-solid fa-circle-check"></i> Challenge Complete! Autonomous state machine executes correctly from DRIVE_TO_TARGET through DELIVER to DONE.</div>
      <div class="u155-warning" id="u155-warning"></div>
    `;
    rightPanel.appendChild(panel);
  }

  function setupScene() {
    if (!window.THREE || !window.scene) return;
    if (sceneRoot) window.scene.remove(sceneRoot);

    sceneRoot = new THREE.Group();
    sceneRoot.name = "unit15_5_scene";
    window.scene.add(sceneRoot);
    window.scene.background = new THREE.Color(0x000000);
    safeCall(setFieldVisible, false);

    if (window.camera) {
      window.camera.position.set(0, 11.5, 0.001);
      window.camera.lookAt(0, 0, 0);
    }

    const ambient = new THREE.AmbientLight(0xffffff, 1.28);
    sceneRoot.add(ambient);
    const dir = new THREE.DirectionalLight(0xf3ead7, 0.9);
    dir.position.set(3, 8, 4);
    sceneRoot.add(dir);

    const fieldSize = FIELD_INCHES * FIELD_SCALE;
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(fieldSize, fieldSize),
      new THREE.MeshStandardMaterial({
        color: 0x050505,
        roughness: 0.95,
        metalness: 0.02,
        polygonOffset: true,
        polygonOffsetFactor: 1,
        polygonOffsetUnits: 1
      })
    );
    floor.rotation.x = -Math.PI / 2;
    sceneRoot.add(floor);

    const grid = new THREE.GridHelper(fieldSize, 6, 0xd8c7a5, 0x1f1f1f);
    grid.position.y = 0.018;
    grid.material.transparent = true;
    grid.material.opacity = 0.42;
    grid.material.depthWrite = false;
    sceneRoot.add(grid);

    addFieldFrame(fieldSize);
    addTargetZone();
    addPathVisual();

    robotGroup = buildRobot();
    sceneRoot.add(robotGroup);

    gameElement = new THREE.Mesh(
      new THREE.SphereGeometry(0.16, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xd8c7a5, roughness: 0.5, metalness: 0.04, emissive: 0x000000 })
    );
    const target = fieldToScene(TARGET_POSE.x, TARGET_POSE.y);
    gameElement.position.set(target.x + 0.28, 0.18, target.z - 0.22);
    sceneRoot.add(gameElement);

    timerRing = new THREE.Mesh(
      new THREE.RingGeometry(0.38, 0.48, 48),
      new THREE.MeshBasicMaterial({ color: 0xf3ead7, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
    );
    timerRing.rotation.x = -Math.PI / 2;
    sceneRoot.add(timerRing);

    transitionFlash = new THREE.Mesh(
      new THREE.RingGeometry(0.55, 0.75, 48),
      new THREE.MeshBasicMaterial({ color: 0xf3ead7, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false })
    );
    transitionFlash.rotation.x = -Math.PI / 2;
    sceneRoot.add(transitionFlash);
  }

  function addFieldFrame(fieldSize) {
    const mat = new THREE.MeshBasicMaterial({ color: 0xd8c7a5, transparent: true, opacity: 0.16, depthWrite: false });
    [
      [0, -fieldSize / 2, fieldSize, 0.04],
      [0, fieldSize / 2, fieldSize, 0.04],
      [-fieldSize / 2, 0, 0.04, fieldSize],
      [fieldSize / 2, 0, 0.04, fieldSize]
    ].forEach(function (data) {
      const wall = new THREE.Mesh(new THREE.BoxGeometry(data[2], 0.14, data[3]), mat);
      wall.position.set(data[0], 0.07, data[1]);
      sceneRoot.add(wall);
    });
  }

  function addTargetZone() {
    const pos = fieldToScene(120, 120);
    scoreZone = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.035, 1.2),
      new THREE.MeshBasicMaterial({ color: 0xf3ead7, transparent: true, opacity: 0.18, depthWrite: false })
    );
    scoreZone.position.set(pos.x, 0.045, pos.z);
    sceneRoot.add(scoreZone);
  }

  function addPathVisual() {
    pathLine = makeLine(0x8f8778, 0.46);
    progressLine = makeLine(0xf3ead7, 0.9);
    sceneRoot.add(pathLine);
    sceneRoot.add(progressLine);
    const start = fieldToScene(START_POSE.x, START_POSE.y);
    const end = fieldToScene(TARGET_POSE.x, TARGET_POSE.y);
    setLine(pathLine, [
      new THREE.Vector3(start.x, 0.08, start.z),
      new THREE.Vector3(end.x, 0.08, end.z)
    ]);
    setLine(progressLine, [
      new THREE.Vector3(start.x, 0.1, start.z),
      new THREE.Vector3(start.x, 0.1, start.z)
    ]);
  }

  function buildRobot() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(0.72, 0.28, 0.58),
      new THREE.MeshStandardMaterial({ color: 0xf3ead7, roughness: 0.62, metalness: 0.08 })
    );
    body.position.y = 0.18;
    group.add(body);

    const front = new THREE.Mesh(
      new THREE.BoxGeometry(0.16, 0.08, 0.62),
      new THREE.MeshBasicMaterial({ color: 0xd8c7a5 })
    );
    front.position.set(0.36, 0.34, 0);
    group.add(front);

    const tireMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.86, metalness: 0.03 });
    const hubMat = new THREE.MeshStandardMaterial({ color: 0xd8c7a5, roughness: 0.58, metalness: 0.1 });
    [-0.38, 0.38].forEach(function (z) {
      [-0.28, 0.28].forEach(function (x) {
        const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.09, 0.1, 20), tireMat);
        wheel.rotation.x = Math.PI / 2;
        wheel.position.set(x, 0.1, z);
        group.add(wheel);
        const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.105, 16), hubMat);
        hub.rotation.x = Math.PI / 2;
        hub.position.copy(wheel.position);
        group.add(hub);
      });
    });

    const clawMat = new THREE.MeshStandardMaterial({ color: 0x8f8778, roughness: 0.65, metalness: 0.08, emissive: 0x000000 });
    clawLeft = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.08, 0.32), clawMat);
    clawRight = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.08, 0.32), clawMat);

    clawRight.position.set(0.5, 0.24, 0.12);

    group.add(clawRight);

  function makeLine(color, opacity) {
    return new THREE.Line(

      new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: opacity, depthWrite: false })
    );
  }

  function tick() {
    updateScene();
  }

  function updateScene() {
    if (!window.THREE || !sceneRoot) return;

      const pos = fieldToScene(state.pose.x, state.pose.y);
      robotGroup.position.set(pos.x, 0, pos.z);
      robotGroup.rotation.y = state.pose.heading;
    }

    if (clawLeft && clawRight) {
      const open = state.clawPosition <= 0.2;
      const spread = open ? 0.2 : 0.09;
      clawLeft.position.z += (-spread - clawLeft.position.z) * 0.24;
      clawRight.position.z += (spread - clawRight.position.z) * 0.24;
      const emissive = open ? 0x2a261d : 0x000000;
      clawLeft.material.emissive.setHex(emissive);
      clawRight.material.emissive.setHex(emissive);
    }

    const start = fieldToScene(START_POSE.x, START_POSE.y);
    const end = fieldToScene(TARGET_POSE.x, TARGET_POSE.y);
    const px = start.x + (end.x - start.x) * state.pathProgress;
    const pz = start.z + (end.z - start.z) * state.pathProgress;
    setLine(progressLine, [
      new THREE.Vector3(start.x, 0.1, start.z),
      new THREE.Vector3(px, 0.1, pz)
    ]);

    if (gameElement) {
      gameElement.material.emissive.setHex(state.scored ? 0x2a261d : 0x000000);
      gameElement.position.y = state.scored ? 0.22 + Math.sin(performance.now() * 0.005) * 0.03 : 0.18;
    }

    if (scoreZone) {
      scoreZone.material.opacity = state.scored ? 0.28 : 0.18;
    }

    if (timerRing) {
      const target = fieldToScene(TARGET_POSE.x, TARGET_POSE.y);
      timerRing.position.set(target.x, 0.065, target.z);
      timerRing.material.opacity = state.currentState === "DELIVER" ? 0.25 + Math.min(0.5, state.deliverElapsed) : 0;
      timerRing.scale.setScalar(1 + Math.min(1, state.deliverElapsed / 0.5) * 0.45);
    }

      const pos = fieldToScene(state.pose.x, state.pose.y);
      transitionFlash.position.set(pos.x, 0.075, pos.z);
      state.transitionPulse = Math.max(0, state.transitionPulse - 0.04);

      transitionFlash.scale.setScalar(1 + (1 - state.transitionPulse) * 0.8);

  function createFollower() {
    state.phase = "FOLLOWER CREATED";

  function getPathBuilder() {

      }

  function createPoint(x, y) {
    return { x: Number(x) || 0, y: Number(y) || 0 };
  }

  function createPose(x, y, heading) {
    return { x: Number(x) || 0, y: Number(y) || 0, heading: Number(heading) || 0 };
  }

  function createBezierLine(start, end) {
    return { type: "line", start: start, end: end };
  }

  function createPath(segment) {

  }

  function setFollowerStartPose(pose) {

    const first = chain.segments[0];
    const segment = first.segment || first;
    return {
      start: segment.start || fallback.start,
      end: segment.end || fallback.end
    };

  function updateFollower() {

    const speed = 0.038;
    state.pathProgress = Math.min(1, state.pathProgress + speed);
    const start = state.path.start;
    const end = state.path.end;
    state.pose.x = start.x + (end.x - start.x) * state.pathProgress;
    state.pose.y = start.y + (end.y - start.y) * state.pathProgress;
    state.pose.heading = Math.atan2(end.y - start.y, end.x - start.x);

      state.pose.x = end.x;
      state.pose.y = end.y;

  function isFollowerBusy() {
    if (state.analysis && state.analysis.wrongBusyCondition) return false;

  function getFollowerPose() {
    return createPose(state.pose.x, state.pose.y, state.pose.heading);
  }

  function setServoPosition(name, value) {

    const position = Number(value);
    state.clawPosition = Number.isFinite(position) ? position : state.clawPosition;
    if (clawDevice && typeof clawDevice.setPosition === "function") {

    }

  function addSimTelemetry(key, value) {
    if (String(key) === "Status" && String(value) === "COMPLETE") {
      state.finalTelemetry = true;
      state.completed = true;
      setCurrentState("DONE");
      state.phase = "COMPLETE";
    }
    safeCall(addTelemetry, key, value);
  }

  function updateClawVisual(name, value) {
    if (name !== "claw") return;
    state.clawPosition = Number(value);
    state.scored = state.clawPosition <= 0.2 && state.pathProgress >= 0.98;
  }

  function updateRobotPose(x, y, heading) {
    state.pose = createPose(x, y, heading);
  }

  function emitFollowerUpdate() {
    followerCallbacks.forEach(function (cb) {
      try {
        cb(state.pose.x, state.pose.y, state.pose.heading);
      } catch (err) {
        console.error("[Follower callback error]", err);
      }
    });
  }

  function waitForStart() {
    state.waitingForStart = true;
    state.phase = "WAITING FOR START";
    updatePanel();
    return new Promise(function (resolve) {
      state._resolveStart = function () {
        if (state.stopRequested) {
          state.waitingForStart = false;
          resolve();
          return;
        }
        state.waitingForStart = false;
        state.runtimeStart = performance.now();
        state.phase = "STARTED";
        updatePanel();
        resolve();
      };

    });

  function releaseWaitForStart() {

  function opModeIsActive() {

  }

  function getSimRuntime() {
    if (!state.runtimeStart) return 0;
    return (performance.now() - state.runtimeStart) / 1000;
  }

  function sleep(ms) {
    return new Promise(function (resolve) {

    });
  }

  function linearTick() {

    validateCode();
    updatePanel();
    return sleep(50);
  }

  async function runLinearOpMode(token) {

    if (!runBody) {

      return;
    }

    state.analysis = analyzeCode(code);
    const js = transpileLinearBody(runBody);
    let fn;
    try {
      fn = new Function(
        "hardwareMap",
        "createFollower",
        "getServo",
        "getPathBuilder",
        "createPose",
        "createPoint",
        "createPath",
        "createBezierLine",
        "setFollowerStartPose",
        "followPathChain",
        "updateFollower",
        "isFollowerBusy",
        "getFollowerPose",
        "setServoPosition",
        "waitForStart",
        "opModeIsActive",
        "sleep",
        "linearTick",
        "getSimRuntime",
        "addTelemetry",

        "clearTelemetry",

        createPose,
        createPoint,
        createPath,
        createBezierLine,
        setFollowerStartPose,
        followPathChain,
        updateFollower,
        isFollowerBusy,
        getFollowerPose,
        setServoPosition,
        waitForStart,
        opModeIsActive,
        sleep,
        linearTick,
        getSimRuntime,
        addSimTelemetry,
        updateTelemetry,
        clearTelemetry

      .replace(/\bnew\s+BezierLine\s*\(/g, "createBezierLine(")
      .replace(/\bnew\s+Point\s*\(/g, "createPoint(")
      .replace(/\bPoint\s*\.\s*CARTESIAN\b/g, '"CARTESIAN"')

      .replace(/\bfollower\s*\.\s*setStartingPose\s*\(/g, "setFollowerStartPose(")

      .replace(/\bfollower\s*\.\s*isBusy\s*\(\s*\)/g, "isFollowerBusy()")
      .replace(/\bfollower\s*\.\s*getPose\s*\(\s*\)/g, "getFollowerPose()")
      .replace(/\bclaw\s*\.\s*setPosition\s*\(/g, 'setServoPosition("claw",')
      .replace(/\bCLAW_OPEN\b/g, String(CLAW_OPEN))
      .replace(/\bCLAW_CLOSED\b/g, String(CLAW_CLOSED))
      .replace(/\bState\s*\.\s*(DRIVE_TO_TARGET|DELIVER|DONE)\b/g, '"$1"')
      .replace(/\bcase\s+(DRIVE_TO_TARGET|DELIVER|DONE)\s*:/g, 'case "$1":')
      .replace(/\bnew\s+Pose\s*\(/g, "createPose(")

      .replace(/\.getY\s*\(\s*\)/g, ".y")

  function addAwaitToWhileLoops(js) {

  function detectRuntimeState() {

    if (value === "DONE") state.completed = true;

  function resetSimulationState() {

    state.startPose = createPose(START_POSE.x, START_POSE.y, START_POSE.heading);
    state.path = null;
    state.pathProgress = 0;
    state.followerBusy = false;
    state.clawPosition = CLAW_CLOSED;
    state.deliverTimer = 0;
    state.deliverElapsed = 0;
    state.lastTransition = "";
    state.transitionPulse = 0;
    state.scored = false;
    state.stuck = false;
    state.completed = false;
    state.lastError = "";
    state.runtimeStart = 0;
    state.finalTelemetry = false;

  function validateCode(updateRequirements) {

    const code = stripComments(raw);
    const runBody = extractMethodBody(code, "runOpMode") || "";
    const analysis = analyzeCode(code);
    state.analysis = analysis;
    const checks = [
      /enum\s+State\s*\{[\s\S]*DRIVE_TO_TARGET[\s\S]*DELIVER[\s\S]*DONE[\s\S]*\}/.test(code),
      /follower\s*\.\s*followPathChain\s*\(/.test(runBody),
      analysis.hasCorrectBusyTransition,
      analysis.opensClawOnTransition,
      analysis.hasDeliverTimer,
      analysis.hasTimerTransition,
      /while\s*\([^)]*currentState\s*!=\s*State\s*\.\s*DONE[^)]*\)/.test(runBody) || /while\s*\([^)]*State\s*\.\s*DONE\s*!=\s*currentState[^)]*\)/.test(runBody),
      /follower\s*\.\s*update\s*\(\s*\)/.test(runBody),
      /while\s*\([^)]*opModeIsActive\s*\(\s*\)[^)]*\)/.test(runBody),
      /telemetry\s*\.\s*addData\s*\(\s*"Status"\s*,\s*"COMPLETE"\s*\)/.test(runBody)

    if (success) success.style.display = checks.every(Boolean) ? "flex" : "none";

  function analyzeCode(code) {
    const runBody = extractMethodBody(code, "runOpMode") || "";
    const driveCase = extractSwitchCase(runBody, "DRIVE_TO_TARGET");
    const deliverCase = extractSwitchCase(runBody, "DELIVER");
    const wrongBusyCondition = /if\s*\(\s*follower\s*\.\s*isBusy\s*\(\s*\)\s*\)/.test(driveCase);
    return {
      hasCorrectBusyTransition: /if\s*\(\s*!\s*follower\s*\.\s*isBusy\s*\(\s*\)\s*\)/.test(driveCase),
      wrongBusyCondition: wrongBusyCondition,
      opensClawOnTransition: /claw\s*\.\s*setPosition\s*\(\s*CLAW_OPEN\s*\)/.test(driveCase),
      hasDeliverTimer: /deliverTimer\s*=\s*getRuntime\s*\(\s*\)/.test(driveCase),
      hasTimerTransition: /getRuntime\s*\(\s*\)\s*-\s*deliverTimer\s*>=\s*0\.5/.test(deliverCase),
      timerWrongLessThan: /getRuntime\s*\(\s*\)\s*-\s*deliverTimer\s*</.test(deliverCase),
      updatesToDeliver: /currentState\s*=\s*State\s*\.\s*DELIVER/.test(driveCase),

  function updateWarning(checks, analysis) {
    const warning = el("u155-warning");
    if (!warning) return;
    let message = "";
    let type = "warn";
    if (analysis.wrongBusyCondition) {
      message = "Invert the condition - !follower.isBusy() means the path is COMPLETE. follower.isBusy() means it is still running.";
      type = "error";
    } else if (!analysis.hasCorrectBusyTransition) {
      message = "Use !follower.isBusy() in DRIVE_TO_TARGET to detect when the path has completed.";
      type = "error";
    } else if (!analysis.updatesToDeliver) {
      message = "Set currentState = State.DELIVER on the DRIVE_TO_TARGET transition - otherwise the state never changes.";
      type = "error";
    } else if (!analysis.opensClawOnTransition) {
      message = "Open the claw when entering DELIVER - call claw.setPosition(CLAW_OPEN) on the transition.";
    } else if (!analysis.hasDeliverTimer) {
      message = "Record getRuntime() when entering DELIVER: deliverTimer = getRuntime(). Without this, DELIVER can transition instantly.";
      type = "error";
    } else if (analysis.timerWrongLessThan || !analysis.hasTimerTransition) {
      message = "Transition to DONE after 0.5 seconds - use getRuntime() - deliverTimer >= 0.5.";
      type = "error";
    } else if (!analysis.updatesToDone) {
      message = "Set currentState = State.DONE when the DELIVER timer reaches 0.5 seconds.";
      type = "error";
    } else if (!checks[7]) {
      message = "Call follower.update() every iteration - without this the follower cannot drive along the path.";

    warning.style.display = message ? "block" : "none";
    warning.classList.toggle("error", type === "error");

  function updatePanel() {

    if (scoreBadge) scoreBadge.style.display = state.scored ? "block" : "none";
    const stuckBadge = el("u155-stuck-badge");
    if (stuckBadge) stuckBadge.style.display = state.stuck ? "block" : "none";
    updateDiagram();
  }

  function updateDiagram() {
    const states = ["drive", "deliver", "done"];
    const names = { drive: "DRIVE_TO_TARGET", deliver: "DELIVER", done: "DONE" };
    states.forEach(function (key) {
      const node = el("u155-node-" + key);
      if (!node) return;
      node.classList.toggle("active", state.currentState === names[key]);
      node.classList.toggle("done", !!state.visited[names[key]] || state.currentState === "DONE");
      node.classList.toggle("stuck", key === "drive" && state.stuck);
    });
    const driveArrow = el("u155-arrow-drive");
    const deliverArrow = el("u155-arrow-deliver");
    if (driveArrow) driveArrow.classList.toggle("pulse", state.transitionPulse > 0 && /DELIVER|DRIVE_TO_TARGET/.test(state.lastTransition));
    if (deliverArrow) deliverArrow.classList.toggle("pulse", state.transitionPulse > 0 && /DONE|DELIVER/.test(state.lastTransition));
  }

  function renderCard(id, html, status) {
    const card = el(id);
    if (!card) return;
    card.className = "u155-card" + (status ? " " + status : "");
    card.innerHTML = html;
  }

  function setLine(line, points) {
    if (!line || !points || points.length < 2) return;
    line.geometry.dispose();
    line.geometry = new THREE.BufferGeometry().setFromPoints(points);
  }

  function fieldToScene(x, y) {
    return {
      x: (Number(x) - FIELD_INCHES / 2) * FIELD_SCALE,
      z: (FIELD_INCHES / 2 - Number(y)) * FIELD_SCALE
    };
  }

  function extractMethodBody(code, name) {
    if (!code) return "";
    const re = new RegExp("\\b(?:public\\s+|private\\s+|protected\\s+)?(?:void|boolean|double|int|String)\\s+" + name + "\\s*\\([^)]*\\)\\s*\\{");
    const match = re.exec(code);
    if (!match) return "";
    let index = match.index + match[0].length;
    let depth = 1;
    for (; index < code.length; index++) {
      if (code[index] === "{") depth++;
      else if (code[index] === "}") {
        depth--;
        if (depth === 0) return code.slice(match.index + match[0].length, index);
      }
    }
    return "";
  }

  function extractSwitchCase(body, name) {
    const re = new RegExp("case\\s+(?:State\\s*\\.\\s*)?" + name + "\\s*:");
    const match = re.exec(body || "");
    if (!match) return "";
    const start = match.index + match[0].length;
    const rest = body.slice(start);
    const next = /\bcase\s+(?:State\s*\.\s*)?(?:DRIVE_TO_TARGET|DELIVER|DONE)\s*:|\bdefault\s*:/.exec(rest);
    return next ? rest.slice(0, next.index) : rest;
  }

  function stripComments(code) {
    return String(code || "")
      .replace(/\/\*[\s\S]*?\*\//g, "")
      .replace(/\/\/.*$/gm, "");
  }

  function getCodeSafe() {
    if (typeof getCode !== "function") return starterCode;
    try {
      return getCode();
    } catch (err) {
      return starterCode;
    }
  }

  function fmt(value) {
    return (Number(value) || 0).toFixed(2);
  }

  function showStudentError(message) {
    const text = String(message || "Unknown simulator error");
    state.lastError = text;
    const warning = el("u155-warning");
    if (warning) {
      warning.classList.add("error");
      warning.style.display = "block";
      warning.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> ' + escapeHTML(text);
    }
    if (typeof _simShowTelemetryError === "function") _simShowTelemetryError(text);
    else {
      safeCall(addTelemetry, "ERROR", text);
      safeCall(updateTelemetry);
    }
  }

  function escapeHTML(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
};
</script>
