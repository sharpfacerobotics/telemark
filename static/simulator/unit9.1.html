<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telemark Unit 9.1 Simulator</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">

  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>

  <style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0d0d14;font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;color:#eee}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}
.CodeMirror{height:100%!important;font-family:"JetBrains Mono","Fira Code","Consolas",monospace!important;font-size:13px;background:#1a1a2e!important}
.CodeMirror-gutters{background:#1a1a2e!important;border-right:1px solid #333!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
button:hover{filter:brightness(1.1)}
button:active{filter:brightness(.9);transform:scale(.98)}
code{font-family:"JetBrains Mono","Fira Code","Consolas",monospace}
#app{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden}
#controls{display:flex;gap:8px;align-items:center}
.btn-run{padding:8px 20px;border-radius:6px;border:none;background:linear-gradient(135deg,#22cc66,#1aa855);color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-stop{padding:8px 20px;border-radius:6px;border:none;background:linear-gradient(135deg,#ff4444,#cc2222);color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-reset{padding:8px 16px;border-radius:6px;border:1px solid #555;background:#2a2a3a;color:#ccc;font-weight:600;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-init{padding:8px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,#007acc,#005aab);color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:6px}
#running-indicator{padding:4px 10px;border-radius:4px;background:rgba(34,204,102,.15);border:1px solid rgba(34,204,102,.3);color:#44cc66;font-size:.75rem;font-family:monospace;font-weight:600;animation:pulse 1.5s ease-in-out infinite;display:none}
#main{flex:1;display:flex;overflow:hidden}
#left-panel{width:55%;min-width:320px;display:flex;flex-direction:column;border-right:1px solid #2a2a3a;background:#1b1b1b}
#split-resizer{width:6px;background:#2a2a3a;cursor:col-resize;z-index:30;flex-shrink:0;touch-action:none}
#split-resizer:hover,#split-resizer.active{background:#ff6600}
.panel-header{padding:10px 14px;background:#111;border-bottom:1px solid #2f2f2f;flex-shrink:0}
.panel-header-title{font-weight:700;color:#fff;font-size:1rem}
.panel-header-sub{color:#9aa0a6;font-size:.82rem}
/* bottom bar matching other simulators */
.bottom-bar{background:#0a0a14;border-top:1px solid #222;padding:10px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.controls-row{display:flex;gap:8px}
.controls-row button{flex:1;padding:10px;border-radius:6px;border:none;font-size:.9rem;font-weight:700;cursor:pointer;color:#fff}
.ds-status{display:flex;justify-content:space-between;align-items:center;font-family:monospace;font-size:.85rem}
.ds-state{font-weight:700}.ds-timer{color:#569cd6}
/* power bar */
.power-bar-panel{margin:10px;background:#0f0f14;border:1px solid #222;border-radius:8px;padding:10px}
.power-bar-label{display:flex;justify-content:space-between;align-items:center;font-family:monospace;font-size:.85rem;margin-bottom:6px}
.power-bar-name{color:#ff6600;font-weight:700}
.power-bar-val{color:#fff;font-weight:700;min-width:40px;text-align:right}
.power-bar-track{height:14px;background:#222;border-radius:7px;position:relative;overflow:hidden}
.power-bar-center{position:absolute;left:50%;top:0;bottom:0;width:1px;background:#555}
.power-bar-fill{position:absolute;top:2px;bottom:2px;border-radius:5px;transition:left .05s,width .05s;background:#44cc66}
#editor-header{padding:8px 12px;background:#14141e;border-bottom:1px solid #2a2a3a;font-size:.8rem;font-weight:600;color:#888;display:flex;align-items:center;gap:6px;flex-shrink:0}
#editor-header span{color:#ff6600}
#editor-wrap{flex:1;overflow:hidden}
#right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#scene-wrap{flex:1;min-height:300px;position:relative}
#scene-container{width:100%;height:100%;overflow:hidden;background:#0a0a10}
#bottom-panels{height:240px;display:flex;border-top:1px solid #2a2a3a;flex-shrink:0}
#telemetry-wrap{flex:1;padding:8px;overflow:auto}
#challenge-wrap{flex:0 0 auto;padding:8px;overflow:visible}
.telem-panel{background:#0a0a14;border:1px solid #333;border-radius:8px;padding:12px;height:100%;display:flex;flex-direction:column;overflow:hidden}
.telem-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0}
.telem-label{font-weight:700;font-size:.85rem;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.telem-body{flex:1;overflow:auto;font-family:"Consolas","Courier New",monospace;font-size:.8rem;line-height:1.6}
.telem-error{color:#ff4444;padding:8px;background:rgba(255,68,68,.1);border-radius:4px;margin-bottom:8px;border:1px solid rgba(255,68,68,.3)}
.telem-empty{color:#555;font-style:italic}
.telem-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.telem-key{color:#4488ff}.telem-val{color:#88ff88}
.challenge-panel{background:#12121a;border:1px solid #333;border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:12px;overflow:auto;max-height:34vh}
.challenge-panel.collapsed .challenge-body{display:none}
.challenge-panel.collapsed{max-height:none}
.challenge-header{display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer}
.challenge-title{font-size:1.1rem;font-weight:700;color:#fff;margin:0;display:flex;align-items:center;gap:8px}
.challenge-desc{font-size:.85rem;color:#bbb;line-height:1.6}
.challenge-desc code{background:#222;padding:1px 4px;border-radius:3px}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:.75rem;font-weight:600;background:rgba(68,136,255,.15);color:#4488ff;border:1px solid rgba(68,136,255,.3)}
.req-section-title{font-size:.8rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.req-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.82rem}
.req-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.req-pass{color:#44cc66}.req-fail{color:#888}
.complete-banner{background:rgba(68,204,102,.1);border:1px solid rgba(68,204,102,.3);border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:8px;font-size:.85rem;color:#44cc66;font-weight:600}
.hint-box{padding:6px 10px;margin-bottom:4px;border-radius:4px;font-size:.8rem}
.hint-error{background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);color:#ff6666}
.hint-warning{background:rgba(255,200,0,.1);border:1px solid rgba(255,200,0,.3);color:#ffcc44}
#badge-strip{display:flex;gap:8px;padding:10px}
.hw-badge{padding:6px 12px;border-radius:8px;font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:8px;border:1px solid rgba(255,255,255,.04);background:#0f0f14;color:#cfe}
#gamepad-card{position:fixed;bottom:12px;right:12px;width:380px;min-width:240px;background:#1e1e24;border:1px solid #333;border-radius:12px;z-index:1000;display:flex;flex-direction:column;box-shadow:0 6px 24px rgba(0,0,0,.5);overflow:hidden}
#gamepad-titlebar{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#1a1a1a;border-bottom:1px solid #333;cursor:grab;user-select:none;flex-shrink:0}
#gamepad-titlebar-label{font-weight:700;font-size:.9rem;color:#fff;display:flex;align-items:center;gap:6px}
#gp-collapse-btn{width:24px;height:24px;padding:0;border-radius:4px;background:#333;border:1px solid #555;color:#ccc;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#gamepad-body{padding:10px;overflow:hidden;flex:1}
.controller-wrap{width:100%;position:relative;aspect-ratio:768/512;border-radius:14px;overflow:hidden;background:#0f0f0f;touch-action:none;user-select:none}
.controller-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;pointer-events:none;z-index:1}
.btn-overlay{position:absolute;border-radius:50%;border:2px solid rgba(255,255,255,.08);background:rgba(255,255,255,.01);cursor:pointer;opacity:.4;z-index:4;touch-action:none}
.btn-overlay.pressed{background:rgba(255,255,255,.18);box-shadow:0 0 0 2px rgba(255,255,255,.25);opacity:1}
.gp-stick-zone{position:absolute;border-radius:50%;background:transparent;cursor:grab;z-index:4;touch-action:none}
.gp-stick-zone.active{background:rgba(255,255,255,.12);box-shadow:0 0 0 2px rgba(255,255,255,.2)}
.gp-stick-knob{position:absolute;left:50%;top:50%;width:52%;height:52%;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle at 35% 35%,rgba(80,80,80,.75),rgba(12,12,12,.55) 70%);border:1px solid rgba(255,255,255,.14);pointer-events:none;opacity:.55}
.gp-trigger{position:absolute;top:0;width:10%;height:14%;transform:translate(-50%,0);background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.15);border-radius:6px;cursor:pointer;overflow:hidden;z-index:5;touch-action:none}
.gp-trigger-fill{position:absolute;left:0;right:0;bottom:0;height:0%;background:linear-gradient(to top,#0098ff,#007acc)}
.dpad-overlay{position:absolute;left:21.5%;top:41%;width:16%;height:24%;transform:translate(-50%,-50%);pointer-events:none;z-index:4}
.dpad-btn{position:absolute;width:33%;height:33%;background:rgba(255,255,255,.01);border:1px solid rgba(255,255,255,.06);pointer-events:auto;cursor:pointer}
.dpad-btn.pressed{background:rgba(255,255,255,.18);box-shadow:0 0 0 2px rgba(255,255,255,.18)}
@media (max-width:900px){
  #left-panel{flex:1 1 auto;width:auto;min-width:0;height:100%;border-right:1px solid #2a2a3a;border-bottom:none}
  #right-panel{flex:0 0 clamp(260px,34vw,330px);width:clamp(260px,34vw,330px);min-width:260px;height:100%}
  .panel-header{padding:8px 12px}
  #challenge-wrap{padding:6px 8px}
  .challenge-panel{padding:10px;max-height:130px}
  #editor-wrap{min-height:210px}
  .bottom-bar{padding:8px;gap:6px}
  .telem-panel{padding:8px;max-height:96px}
  #badge-strip{padding:6px 8px;gap:6px;flex-wrap:wrap}
  #scene-wrap{flex:0 0 auto;width:calc(100% - 16px);aspect-ratio:1/1;margin:8px;min-height:0}
  #scene-container{border-radius:8px}
  #gamepad-card{width:min(330px,calc(100vw - 24px));right:8px;bottom:8px}
}
@media (max-width:640px){
  #main{flex-direction:column}
  #left-panel{width:100%;height:62%;border-right:none;border-bottom:1px solid #2a2a3a}
  #split-resizer{display:none}
  #right-panel{flex:1 1 auto;width:100%;min-width:0;height:38%;min-height:260px}
  #scene-wrap{flex:1 1 auto;width:auto;aspect-ratio:auto;margin:0;min-height:0}
}
  </style>

<body>

<!-- Hidden React root (required by build system) -->
<div id="root" style="display:none"></div>
<script type="module" src="/src/main.tsx"></script>

<div id="app">
  <div id="main">
    <div id="left-panel">
      <div class="panel-header"><div class="panel-header-title">Telemark Unit 9.1 Simulator</div><div class="panel-header-sub">Gate Servo Control · Map a servo · Use the gamepad</div></div>
      <div id="challenge-wrap"></div>
      <div id="editor-header"><span>&lt;/&gt;</span> Code Editor</div>

      <div class="bottom-bar">

          <button id="btn-init" class="btn-init" onclick="handleInit()"><i class="fa-solid fa-power-off"></i> INIT</button>

        <div class="power-bar-track"><div class="power-bar-center"></div><div class="power-bar-fill" id="power-fill"></div></div>
      </div>
    </div>
  </div>
</div>

<div id="gamepad-card">
  <div id="gamepad-titlebar">
  <span id="gamepad-titlebar-label"><i class="fa-solid fa-gamepad" style="color:#4488ff"></i> Gamepad 1</span>
    <button id="gp-collapse-btn" onclick="toggleGamepad()">▲</button>
  </div>
  <div id="gamepad-body">
    <div class="controller-wrap" id="controller-wrap">
      <img class="controller-img" alt="controller" src="https://resource.logitechg.com/w_776,h_437,ar_16:9,c_fill,q_auto,f_auto,dpr_1.0/d_transparent.gif/content/dam/gaming/en/products/f310/f310-feature-3.png">

      <div id="btn-a" class="btn-overlay" style="left:75.5%;top:49%;width:7%;height:10%;transform:translate(-10%,-10%)"></div>

<!-- Three.js loaded via global script tags above -->

<script>
var STARTER_CODE = '@TeleOp(name="Gate_Servo")\npublic class GateServo extends OpMode {\n\n    Servo gate;\n\n    @Override\n    public void init() {\n        // TODO: Map "gate" from the hardwareMap\n        // TODO: Set the gate to 0.0 so it starts closed\n        telemetry.addData("Status", "Initialized");\n    }\n\n    @Override\n    public void loop() {\n        if (gamepad1.y) {\n            // TODO: Open the gate to position 0.75\n        } else if (gamepad1.a) {\n            // TODO: Close the gate to position 0.0\n        }\n\n        // TODO: Show the current gate state or position with telemetry\n        telemetry.update();\n    }\n}';

var state = {
  running: false, code: STARTER_CODE, telemetry: [], telemetryError: null, initialized: false,
  gamepad: { a:false,b:false,x:false,y:false,dpad_up:false,dpad_down:false,dpad_left:false,dpad_right:false,left_bumper:false,right_bumper:false,left_trigger:0,right_trigger:0,left_stick_x:0,left_stick_y:0,right_stick_x:0,right_stick_y:0,back:false,start:false },
  loopInterval:null, runtimeInterval:null, runtimeSeconds:0, telemetryBuffer:[], challengeCollapsed:false
};

// Hardware
var hardwareDevices={}, servoCallbacks=[];
function registerServo(n){var self={type:'servo',name:n,position:0,setPosition:function(p){this.position=Math.max(0,Math.min(1,p));var pp=this.position;servoCallbacks.forEach(function(cb){cb(n,pp)})},getPosition:function(){return this.position}};hardwareDevices[n]=self}
function onServoPosition(cb){servoCallbacks.push(cb)}
function resetHardware(){Object.values(hardwareDevices).forEach(function(d){if(d.type==='servo')d.position=0})}
registerServo('gate');
var mockHardwareMap={get:function(_t,n){if(!hardwareDevices[n])registerServo(n);return hardwareDevices[n]}};
function setServoPosition(n,p){p=Math.max(0,Math.min(1,p));var d=hardwareDevices[n];if(d&&d.setPosition)d.setPosition(p)}

// Transpiler
function getMethodBody(c,m){var r=new RegExp('(?:@\\w+[\\s\\S]*?)?(?:public\\s+)?void\\s+'+m+'\\s*\\([^)]*\\)\\s*\\{','g');var mt=r.exec(c);if(!mt)return null;var bc=1,i=mt.index+mt[0].length,s=i;while(i<c.length&&bc>0){if(c[i]==='{')bc++;if(c[i]==='}')bc--;i++}return bc!==0?null:c.substring(s,i-1)}
function detectBlockingLoop(c){return/while\s*\(\s*(true|gamepad\d?\.|opModeIsActive)/.test(c)}
function extractClassFields(c){var f={},r=/\b(Servo|DcMotor|CRServo|DistanceSensor|TouchSensor|ColorSensor|IMU|BNO055IMU)\s+(\w+)\s*;/g,m;while((m=r.exec(c))!==null)f[m[2]]=m[1];return f}
function extractHardwareNames(b){var m2={},r=/(\w+)\s*=\s*hardwareMap\s*\.\s*get\s*\(\s*\w+\s*\.\s*class\s*,\s*"(\w+)"\s*\)/g,mm;while((mm=r.exec(b))!==null)m2[mm[1]]=mm[2];return m2}
function transpileJava(j,cf,hn){var s=j;s=s.replace(/\b(double|int|boolean|String|float|long|byte|short|char)\s+(?=[a-zA-Z_])/g,'let ');s=s.replace(/\blet\s*\[\s*\]/g,'let ');s=s.replace(/\b(Servo|DcMotor|CRServo|DistanceSensor|TouchSensor|ColorSensor|IMU|BNO055IMU)\s+(\w+)/g,'let $2');s=s.replace(/\bhardwareMap\s*\.\s*get\s*\(\s*(\w+)\.class\s*,/g,'hardwareMap.get("$1",');if(hn){s=s.replace(/(\w+)\.setPosition\s*\(/g,function(_,v){return'setServoPosition("'+(hn[v]||v)+'", '});s=s.replace(/(\w+)\.setPower\s*\(/g,function(_,v){return'setMotorPower("'+(hn[v]||v)+'", '})}else{s=s.replace(/(\w+)\.setPosition\s*\(/g,function(_,v){return'setServoPosition("'+v+'", '})}s=s.replace(/\bgamepad1\./g,'gamepad.');s=s.replace(/\btelemetry\s*\.\s*addData\s*\(/g,'addTelemetry(');s=s.replace(/\btelemetry\s*\.\s*update\s*\(\s*\)/g,'updateTelemetry()');s=s.replace(/\btelemetry\s*\.\s*clear\s*\(\s*\)/g,'clearTelemetry()');return s}

// Telemetry
function addTelemetry(k,v){state.telemetryBuffer.push({key:k,value:String(v)})}
function updateTelemetry(){state.telemetry=state.telemetryBuffer.slice();renderTelemetry()}

  ss.animFrame = requestAnimationFrame(animate);

  if (Math.abs(df) > .001) ss.currentGateAngle += df * .12; else ss.currentGateAngle = ss.targetGateAngle;
  if (ss.gateGroup) ss.gateGroup.rotation.x = ss.currentGateAngle;
