<div id="editor-container">
  <div class="editor-header"><div><div class="editor-title">FTC Unit 7: Hardware Mapping</div><div class="editor-subtitle">hardwareMap · Config · Motor Direction · IMU Init</div></div></div>
  <div class="code-wrapper">
    <textarea id="code-editor" spellcheck="false" oninput="onCodeChange()" onscroll="syncScroll(this)">@TeleOp(name="HardwareMap_Demo")
public class HardwareMapDemo extends OpMode {

    DcMotor leftFront, rightFront, leftBack, rightBack;
    DcMotor arm;
    Servo claw;
    IMU imu;
    ColorSensor colorSensor;

    @Override
    public void init() {
        leftFront   = hardwareMap.get(DcMotor.class, "leftFront");
        rightFront  = hardwareMap.get(DcMotor.class, "rightFront");
        leftBack    = hardwareMap.get(DcMotor.class, "leftBack");
        rightBack   = hardwareMap.get(DcMotor.class, "rightBack");

        leftFront.setDirection(DcMotorSimple.Direction.REVERSE);
        leftBack.setDirection(DcMotorSimple.Direction.REVERSE);

        arm  = hardwareMap.get(DcMotor.class, "arm");
        claw = hardwareMap.get(Servo.class, "claw");

        arm.setZeroPowerBehavior(DcMotor.ZeroPowerBehavior.BRAKE);

        imu = hardwareMap.get(IMU.class, "imu");
        IMU.Parameters parameters = new IMU.Parameters(
            new RevHubOrientationOnRobot(
                RevHubOrientationOnRobot.LogoFacingDirection.UP,
                RevHubOrientationOnRobot.UsbFacingDirection.FORWARD
            )
        );
        imu.initialize(parameters);

        colorSensor = hardwareMap.get(ColorSensor.class, "colorSensor");

        telemetry.addData("Status", "Hardware Mapped");
    }

    @Override
    public void loop() {
        telemetry.addData("Status", "Running");
    }
}</textarea>

<script>
var codeEditor = document.getElementById('code-editor');
var activeHints = [];
var hwDevices = [];
var declaredVars = {}; 
var currentState = 'STOPPED';
var intervalId = null, timerId = null, runtimeOffset = 0;
var gamepad = {left_stick_x:0,left_stick_y:0,right_stick_x:0,right_stick_y:0,left_trigger:0,right_trigger:0,a:false,b:false,x:false,y:false,left_bumper:false,right_bumper:false,start:false,back:false,dpad_up:false,dpad_down:false,dpad_left:false,dpad_right:false};

var robotConfig = null; 
var robotConfigInitialized = false;
var urlParams = new URLSearchParams(window.location.search);
var customCode = urlParams.get('code');

// UI & Editor Helpers
function updateCode(t){
    var el = document.getElementById('highlighting-content');
    if (t[t.length-1] === '\n') t += ' ';
    el.innerHTML = t.replace(/&/g,'&amp;').replace(/</g,'&lt;');
    Prism.highlightElement(el);
}
function syncScroll(el){
    var h = document.getElementById('highlighting');
    h.scrollTop = el.scrollTop;
    h.scrollLeft = el.scrollLeft;
}
function onCodeChange(){
    updateCode(codeEditor.value);
    syncScroll(codeEditor);
    runAnalysis();
}

codeEditor.addEventListener('keydown', function(e){
    var s = this.selectionStart, end = this.selectionEnd;
    if(e.key === 'Tab'){
        e.preventDefault();
        this.value = this.value.substring(0,s) + '    ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = s + 4;
        onCodeChange();
        return;
    }
    var p = {'(':')','{':'}','[':']','"':'"',"'":"'"};
    if(p[e.key]){
        e.preventDefault();
        this.value = this.value.substring(0,s) + e.key + p[e.key] + this.value.substring(end);
        this.selectionStart = this.selectionEnd = s + 1;
        onCodeChange();
        return;
    }
    if(e.key === 'Enter'){
        e.preventDefault();
        var before = this.value.substring(0,s), lastLine = before.split('\n').pop(), indent = lastLine.match(/^\s*/)[0], extra = lastLine.trimEnd().endsWith('{') ? '    ' : '', ins = '\n' + indent + extra;
        this.value = before + ins + this.value.substring(end);
        this.selectionStart = this.selectionEnd = s + ins.length;
        onCodeChange();
    }
});

var resizer=document.getElementById('resizer'),leftPanel=document.getElementById('editor-container'),isResizing=false;
resizer.addEventListener('mousedown',function(){isResizing=true;resizer.classList.add('active')});
document.addEventListener('mousemove',function(e){
    if(!isResizing) return;
    var pct=(e.clientX/window.innerWidth)*100;
    if(pct>15 && pct<80) leftPanel.style.width=pct+'%';
});
document.addEventListener('mouseup',function(){isResizing=false;resizer.classList.remove('active')});

function addHint(m,t){
    for(var i=0;i<activeHints.length;i++){ if(activeHints[i].msg===m) return; }
    activeHints.push({msg:m,type:t||'warn'});
}
function renderHints(){
    var c=document.getElementById('hint-container');
    c.innerHTML='';
    activeHints.forEach(function(h){
        var cls='hint';
        if(h.type==='error') cls+=' error';
        else if(h.type==='info') cls+=' info';
        else if(h.type==='good') cls+=' good';
        c.innerHTML+='<div class="'+cls+'">'+h.msg+'</div>';
    });
}

function getMethodBody(code, name) {
  var re = new RegExp('void\\s+' + name + '\\s*\\([^)]*\\)\\s*\\{');
  var m = re.exec(code);
  if (!m) return null;
  var idx = m.index + m[0].length, depth = 1;
  for (; idx < code.length; idx++) {
    if (code[idx] === '{') depth++;
    else if (code[idx] === '}') { 
        depth--; 
        if (depth === 0) return code.slice(m.index + m[0].length, idx); 
    }
  }
  return null;
}

function getRuntime() { return runtimeOffset === 0 ? 0 : (Date.now() - runtimeOffset) / 1000; }

// ── Parse & Analyze ──
function runAnalysis() {
  var code = codeEditor.value;
  hwDevices = [];
  activeHints = [];
  declaredVars = {};

  var nameMatch = /@(?:TeleOp|Autonomous)\s*\(\s*name\s*=\s*"([^"]+)"/.exec(code);
  document.getElementById('opmode-name').textContent = nameMatch ? nameMatch[1] : 'Unnamed OpMode';

  var initBody = getMethodBody(code, 'init') || '';
  var loopBody = getMethodBody(code, 'loop') || '';

  var declTypes = ['DcMotor','Servo','IMU','ColorSensor','DistanceSensor','TouchSensor','CRServo'];
  declTypes.forEach(function(dtype) {
    var re = new RegExp('\\b' + dtype + '\\s+([\\w\\s,]+);', 'g');
    var m;
    while ((m = re.exec(code)) !== null) {
      var names = m[1].split(',');
      names.forEach(function(n) {
        n = n.trim();
        if (n && /^\w+$/.test(n)) declaredVars[n] = dtype;
      });
    }
  });

  var hwRe = /(\w+)\s*=\s*hardwareMap\.get\(\s*(\w+)\.class\s*,\s*"([^"]+)"\s*\)/g;
  var match;
  while ((match = hwRe.exec(code)) !== null) {
    var varName = match[1], devType = match[2], configName = match[3];
    var inInit = initBody.indexOf(match[0]) !== -1;
    var inLoop = loopBody.indexOf(match[0]) !== -1;
    if (inLoop) addHint('Never call hardwareMap.get() in loop() — map all hardware in init()', 'error');

    var isDeclared = declaredVars[varName] !== undefined;
    if (!isDeclared) addHint('Variable "' + varName + '" is used but never declared — add <code>' + devType + ' ' + varName + ';</code> as a field', 'error');

    if (isDeclared && declaredVars[varName] !== devType) {
      addHint('Variable "' + varName + '" is declared as ' + declaredVars[varName] + ' but mapped as ' + devType, 'error');
    }

    hwDevices.push({
      varName: varName, type: devType, configName: configName,
      direction: 'FORWARD', zeroPower: 'FLOAT', initialized: false,
      usedInLoop: false, inInit: inInit, isDeclared: isDeclared
    });
  }

  if (!robotConfigInitialized) {
    robotConfig = {};
    hwDevices.forEach(function(d) { robotConfig[d.configName] = d.type; });
    robotConfigInitialized = true;
  }

  hwDevices.forEach(function(d) {
    d.configExists = robotConfig[d.configName] !== undefined;
    if (d.configExists && robotConfig[d.configName] !== d.type) {
      addHint('Type mismatch — "' + d.configName + '" is configured as ' + robotConfig[d.configName] + ' but code requests ' + d.type, 'error');
    }
  });

  var names = {};
  hwDevices.forEach(function(d) {
    if (names[d.configName]) addHint('Duplicate hardware name "' + d.configName + '" — each device needs a unique name', 'error');
    names[d.configName] = true;
  });

  var dirRe = /(\w+)\.setDirection\s*\(\s*DcMotorSimple\.Direction\.(\w+)\s*\)/g;
  while ((match = dirRe.exec(initBody)) !== null) {
    var dev = hwDevices.find(function(d) { return d.varName === match[1]; });
    if (dev) dev.direction = match[2];
  }

  var zpRe = /(\w+)\.setZeroPowerBehavior\s*\(\s*DcMotor\.ZeroPowerBehavior\.(\w+)\s*\)/g;
  while ((match = zpRe.exec(initBody)) !== null) {
    var dev2 = hwDevices.find(function(d) { return d.varName === match[1]; });
    if (dev2) dev2.zeroPower = match[2];
  }

  var imuInitRe = /(\w+)\.initialize\s*\(/g;
  while ((match = imuInitRe.exec(initBody)) !== null) {
    var imuDev = hwDevices.find(function(d) { return d.varName === match[1] && d.type === 'IMU'; });
    if (imuDev) imuDev.initialized = true;
  }

  hwDevices.forEach(function(d) {
    if (loopBody.indexOf(d.varName) !== -1) d.usedInLoop = true;
  });

  var driveMotors = hwDevices.filter(function(d) { return d.type === 'DcMotor' && /left|right|front|back/i.test(d.varName); });
  if (driveMotors.length >= 4) {
    var hasAnyReverse = driveMotors.some(function(d) { return d.direction === 'REVERSE'; });
    if (!hasAnyReverse) addHint('Mecanum drives need some motors reversed — typically both left side motors should be REVERSE');
    driveMotors.forEach(function(d) {
      if (/left/i.test(d.varName) && d.direction !== 'REVERSE') {
        addHint('"' + d.varName + '" is a left motor but direction is FORWARD — left side usually needs REVERSE');
      }
      if (/right/i.test(d.varName) && d.direction === 'REVERSE') {
        addHint('"' + d.varName + '" is a right motor but direction is REVERSE — right side is usually FORWARD');
      }
    });
  }

  var imuDev2 = hwDevices.find(function(d) { return d.type === 'IMU'; });
  if (imuDev2 && !imuDev2.initialized) addHint('IMU must be initialized with .initialize() before use');

  hwDevices.forEach(function(d) {
    if (!d.usedInLoop && d.inInit) {
      if (d.type === 'DcMotor' || d.type === 'Servo') {
        addHint('"' + d.varName + '" is mapped in init() but never used in loop()', 'info');
      }
    }
  });

  for (var vn in declaredVars) {
    if (loopBody.indexOf(vn + '.') !== -1) {
      var wasMapped = hwDevices.some(function(d) { return d.varName === vn; });
      if (!wasMapped) addHint('NullPointerException — "' + vn + '" is used in loop() but never assigned via hardwareMap.get() in init()', 'error');
    }
  }

  renderHints();
  renderBadgeStrip();
  renderHwMap();
  renderConfigPanel();
  updateRobot3D();
}

function setLifecycle(s, color, btnLabel) {

function stopAllIntervals() { 
    clearInterval(intervalId); 
    clearInterval(timerId);

// THE TRANSPILER: This turns basic Java logic into JavaScript so if/else actually evaluates!
function executeTelemetryFrom(methodName) {
  var code = codeEditor.value;
  var body = getMethodBody(code, methodName);
  if (!body) return;
  
  var telemetryLines = [];

  // Fallback regex function in case the JS execution fails
  function fallbackRegex(codeString) {
      var telRe = /telemetry\.addData\s*\(\s*"([^"]+)"\s*,\s*([^)]+)\s*\)/g;
      var m;
      while ((m = telRe.exec(codeString)) !== null) {
        var key = m[1], val = m[2].trim();
        if (/^"[^"]*"$/.test(val)) val = val.slice(1, -1);
        else if (val === 'getRuntime()') val = getRuntime().toFixed(2);
        telemetryLines.push('<div class="telemetry-line"><span class="telemetry-key">' + key + '</span>: ' + val + '</div>');
      }
  }

  // Only try to transpile the loop() method logic
  if (methodName === 'loop') {
      // 1. Swap gamepad1 -> gamepad
      // 2. Swap telemetry.addData("Key", Value) -> addTel("Key", Value)
      // 3. Remove telemetry.update() to prevent crashes
      var jsCode = body
          .replace(/gamepad1\./g, 'gamepad.')
          .replace(/telemetry\.addData\s*\(\s*(.+?)\s*,\s*(.+?)\s*\)/g, 'addTel($1, $2)')
          .replace(/telemetry\.update\(\);/g, '');

      // Helper to format output lines for our fake JS environment
      var addTel = function(key, val) {
          if (typeof val === 'number') val = val.toFixed(2);
          if (val === 'getRuntime()') val = getRuntime().toFixed(2);
          // Clean up quotes on string keys
          var cleanKey = String(key).replace(/^"|"$/g, '');
          telemetryLines.push('<div class="telemetry-line"><span class="telemetry-key">' + cleanKey + '</span>: ' + val + '</div>');
      };

      try {
          // Attempt to evaluate the java code as Javascript
          var logicFunc = new Function('gamepad', 'addTel', 'getRuntime', jsCode);
          logicFunc(gamepad, addTel, getRuntime);
      } catch (e) {
          // If the student wrote complex Java syntax that breaks JS (like type casting), fall back to dumb Regex
          fallbackRegex(body);
      }
  } else {
      fallbackRegex(body);
  }

  if (telemetryLines.length) {
      document.getElementById('telemetry-log').innerHTML = telemetryLines.join('');
  }
}

function handleMainButton() {
  if (currentState === 'STOPPED') {
    runAnalysis();
    document.getElementById('telemetry-log').innerHTML = '';
    document.getElementById('timer-val').textContent = '0.00';
    runtimeOffset = 0;
    executeTelemetryFrom('init');
    setLifecycle('INIT', '#ffcc00', 'START');
  } else if (currentState === 'INIT') {
    runtimeOffset = Date.now();
    setLifecycle('RUNNING', '#00ff00', 'RUNNING');
    timerId = setInterval(function() { document.getElementById('timer-val').textContent = getRuntime().toFixed(2); }, 50);
    intervalId = setInterval(function() { executeTelemetryFrom('loop'); }, 100);
  }
}

function handleStopButton() {
  if (currentState === 'STOPPED') return;
  stopAllIntervals();
  runtimeOffset = 0;
  document.getElementById('timer-val').textContent = '0.00';
  document.getElementById('telemetry-log').innerHTML = '<span style="color:#666">Press INIT to start...</span>';
  setLifecycle('STOPPED', 'var(--danger)', 'INIT');
}

  hwDevices.forEach(function(d) { types[d.type] = true; });

  for (var t in types) {
    html += '<div class="hw-badge ' + (types[t] ? 'active' : 'inactive') + '"><i class="fa-solid ' + (icons[t]||'fa-microchip') + '"></i> ' + t + '</div>';

function renderHwMap() {
  var container = document.getElementById('hw-map-list');
  if (hwDevices.length === 0) {
    container.innerHTML = '<div style="color:#666;font-style:italic;font-size:.85rem">No hardware mapped — add hardwareMap.get() calls in init()</div>';
    return;
  }
  var icons = {DcMotor:'fa-gear',Servo:'fa-gears',IMU:'fa-compass',ColorSensor:'fa-palette'};
  var html = '';
  hwDevices.forEach(function(d) {
    var configMatch = robotConfig[d.configName] === d.type;
    var statusIcon, cls;
    if (!d.isDeclared) {
      statusIcon = '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)" title="Variable not declared"></i>';
      cls = 'error';
    } else if (!d.inInit) {
      statusIcon = '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)" title="Not in init()"></i>';
      cls = 'error';
    } else if (!configMatch) {
      statusIcon = '<i class="fa-solid fa-circle-xmark" style="color:var(--danger)" title="Config name mismatch"></i>';
      cls = 'error';
    } else {
      statusIcon = '<i class="fa-solid fa-circle-check" style="color:var(--good)" title="OK"></i>';
      cls = 'ok';
    }
    var dirBadge = '';
    if (d.type === 'DcMotor') {
      dirBadge = '<span class="hw-dir ' + (d.direction === 'REVERSE' ? 'rev' : 'fwd') + '">' + (d.direction === 'REVERSE' ? '\u2190 REV' : '\u2192 FWD') + '</span>';
      if (d.zeroPower === 'BRAKE') dirBadge += '<span class="hw-dir brake">BRAKE</span>';
    }
    if (d.type === 'IMU' && d.initialized) dirBadge = '<span class="hw-dir fwd">INIT</span>';
    html += '<div class="hw-slot ' + cls + '">';
    html += '<span class="hw-icon"><i class="fa-solid ' + (icons[d.type]||'fa-microchip') + '"></i></span>';
    html += '<span class="hw-type">' + d.type + '</span>';
    html += '<span class="hw-name">' + d.varName + ' \u2192 "' + d.configName + '"</span>';
    html += dirBadge;
    html += '<span class="hw-status">' + statusIcon + '</span>';
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderConfigPanel() {
  if (!robotConfig) return;
  var motors = [], servos = [], i2cs = [];
  for (var name in robotConfig) {
    var entry = { name: name, type: robotConfig[name] };
    if (entry.type === 'DcMotor') motors.push(entry);
    else if (entry.type === 'Servo' || entry.type === 'CRServo') servos.push(entry);
    else i2cs.push(entry);
  }

  var portTypeMap = { 'Motor': 'DcMotor', 'Servo': 'Servo', 'I2C': 'IMU' };

  function makePortRows(label, count, entries) {
    var html = '';
    var defaultType = portTypeMap[label] || 'DcMotor';
    for (var i = 0; i < count; i++) {
      var e = entries[i];
      html += '<div class="port-row"><span class="port-label">' + label + ' ' + i + '</span>';
      if (e) {
        html += '<span class="port-device"><input value="' + e.name + '" data-oldname="' + e.name + '" data-type="' + e.type + '" onchange="renameConfigDevice(this)"/></span>';
      } else {
        html += '<span class="port-device"><input value="" placeholder="\u2014 empty \u2014" data-oldname="" data-type="' + defaultType + '" onchange="addConfigDevice(this)"/></span>';
      }
      html += '</div>';
    }
    return html;
  }

  var html = '';
  html += '<div class="hub-section"><div class="hub-header open" onclick="toggleHub(this)"><span>Expansion Hub 0</span><i class="fa-solid fa-chevron-right"></i></div>';
  html += '<div class="hub-body open">';
  html += makePortRows('Motor', 4, motors.slice(0, 4));
  html += makePortRows('Servo', 6, servos.slice(0, 6));
  html += makePortRows('I2C', 4, i2cs.slice(0, 4));
  html += '</div></div>';
  html += '<div class="hub-section"><div class="hub-header" onclick="toggleHub(this)"><span>Expansion Hub 1</span><i class="fa-solid fa-chevron-right"></i></div>';
  html += '<div class="hub-body">';
  html += makePortRows('Motor', 4, motors.slice(4));
  html += makePortRows('Servo', 6, servos.slice(6));
  html += makePortRows('I2C', 4, i2cs.slice(4));
  html += '</div></div>';
  document.getElementById('config-panel').innerHTML = html;
}

function toggleHub(el) { 
    el.classList.toggle('open'); 
    el.nextElementSibling.classList.toggle('open'); 
}

function renameConfigDevice(input) {
  var oldName = input.dataset.oldname;
  var devType = input.dataset.type;
  var newName = input.value.trim();
  if (!newName) {
    delete robotConfig[oldName];
    runAnalysis();
    return;
  }
  delete robotConfig[oldName];
  robotConfig[newName] = devType;
  runAnalysis();
}

function addConfigDevice(input) {
  var newName = input.value.trim();
  if (!newName) return;
  var devType = input.dataset.type;
  robotConfig[newName] = devType;
  runAnalysis();
}

// ── 3D Robot Setup ──
var scene, camera, renderer, robotGroup;
var wheelMeshes = {}, armMesh, clawMesh, labelSprites = {};
var orbitState = { isDragging: false, prevX: 0, prevY: 0, theta: 0.8, phi: 0.6, radius: 5.5, target: {x:0,y:0.3,z:0}, autoRotate: true };

function initRobot3D() {
  var canvas = document.getElementById('robot-canvas');
  var w = canvas.clientWidth, h = canvas.clientHeight;
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);
  camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
  updateCameraFromOrbit();
  renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  scene.add(new THREE.AmbientLight(0x444444));
  var dl = new THREE.DirectionalLight(0xffffff, 0.8);
  dl.position.set(3, 5, 4);
  scene.add(dl);
  scene.add(new THREE.GridHelper(6, 12, 0x333333, 0x222222));

  robotGroup = new THREE.Group();
  scene.add(robotGroup);

  var bodyGeo = new THREE.BoxGeometry(1.6, 0.3, 2);
  var body = new THREE.Mesh(bodyGeo, new THREE.MeshPhongMaterial({ color: 0x333333 }));
  body.position.y = 0.45;
  robotGroup.add(body);

  var wheelGeo = new THREE.CylinderGeometry(0.22, 0.22, 0.12, 16);
  var wpos = { leftFront:[-0.9,0.22,-0.75], rightFront:[0.9,0.22,-0.75], leftBack:[-0.9,0.22,0.75], rightBack:[0.9,0.22,0.75] };
  for (var wn in wpos) {
    var wm = new THREE.Mesh(wheelGeo, new THREE.MeshPhongMaterial({ color: 0x555555 }));
    wm.rotation.z = Math.PI / 2;
    wm.position.set(wpos[wn][0], wpos[wn][1], wpos[wn][2]);
    robotGroup.add(wm);
    wheelMeshes[wn] = wm;
  }

  armMesh = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.8, 0.15), new THREE.MeshPhongMaterial({ color: 0x555555 }));
  armMesh.position.set(0, 1, -0.8);
  robotGroup.add(armMesh);

  clawMesh = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.12, 0.2), new THREE.MeshPhongMaterial({ color: 0x555555 }));
  clawMesh.position.set(0, 1.4, -0.9);
  robotGroup.add(clawMesh);

  canvas.addEventListener('pointerdown', function(e) {
    orbitState.isDragging = true;
    orbitState.autoRotate = false;
    orbitState.prevX = e.clientX;
    orbitState.prevY = e.clientY;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener('pointermove', function(e) {
    if (!orbitState.isDragging) return;
    var dx = e.clientX - orbitState.prevX;
    var dy = e.clientY - orbitState.prevY;
    orbitState.theta -= dx * 0.008;
    orbitState.phi = Math.max(0.1, Math.min(Math.PI - 0.1, orbitState.phi - dy * 0.008));
    orbitState.prevX = e.clientX;
    orbitState.prevY = e.clientY;
    updateCameraFromOrbit();
  });
  canvas.addEventListener('pointerup', function() { orbitState.isDragging = false; });
  canvas.addEventListener('pointercancel', function() { orbitState.isDragging = false; });
  canvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    orbitState.autoRotate = false;
    orbitState.radius = Math.max(2, Math.min(15, orbitState.radius + e.deltaY * 0.01));
    updateCameraFromOrbit();
  }, { passive: false });

  renderer.render(scene, camera);
}

function updateCameraFromOrbit() {
  if (!camera) return;
  var t = orbitState;
  camera.position.x = t.target.x + t.radius * Math.sin(t.phi) * Math.sin(t.theta);
  camera.position.y = t.target.y + t.radius * Math.cos(t.phi);
  camera.position.z = t.target.z + t.radius * Math.sin(t.phi) * Math.cos(t.theta);
  camera.lookAt(t.target.x, t.target.y, t.target.z);
}

function makeTextSprite(text, color) {
  var c2 = document.createElement('canvas');
  c2.width = 256; c2.height = 64;
  var ctx = c2.getContext('2d');
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = color || '#00ff00';
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);
  var tex = new THREE.CanvasTexture(c2);
  var sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(1.2, 0.3, 1);
  return sprite;
}

function updateRobot3D() {
  if (!scene) return;
  for (var k in labelSprites) robotGroup.remove(labelSprites[k]);
  labelSprites = {};

  var byVar = {};
  hwDevices.forEach(function(d) { byVar[d.varName] = d; });

  var wheelSlots = ['leftFront','rightFront','leftBack','rightBack'];
  var lpos = { leftFront:[-0.9,0.55,-0.75], rightFront:[0.9,0.55,-0.75], leftBack:[-0.9,0.55,0.75], rightBack:[0.9,0.55,0.75] };

  wheelSlots.forEach(function(slot) {
    var mesh = wheelMeshes[slot];
    if (!mesh) return;
    var dev = byVar[slot];
    if (dev) {
      mesh.material.color.setHex(dev.direction === 'REVERSE' ? 0x3366cc : 0x00aa00);
      var label = makeTextSprite(dev.configName, dev.direction === 'REVERSE' ? '#6699ff' : '#00ff00');
      label.position.set(lpos[slot][0], lpos[slot][1], lpos[slot][2]);
      robotGroup.add(label);
      labelSprites[slot] = label;
    } else {
      mesh.material.color.setHex(0x555555);
    }
  });

  var armDev = hwDevices.find(function(d) { return d.type === 'DcMotor' && wheelSlots.indexOf(d.varName) === -1; });
  if (armDev) {
    armMesh.material.color.setHex(0x00aa00);
    var al = makeTextSprite(armDev.configName, '#00ff00');
    al.position.set(0, 1.55, -0.8);
    robotGroup.add(al); labelSprites['arm'] = al;
  } else { armMesh.material.color.setHex(0x555555); }

  var clawDev = hwDevices.find(function(d) { return d.type === 'Servo'; });
  if (clawDev) {
    clawMesh.material.color.setHex(0x0088cc);
    var cl = makeTextSprite(clawDev.configName, '#00aaff');
    cl.position.set(0, 1.7, -0.9);
    robotGroup.add(cl); labelSprites['claw'] = cl;
  } else { clawMesh.material.color.setHex(0x555555); }

  renderer.render(scene, camera);
}

function animateRobot() {
  requestAnimationFrame(animateRobot);
  if (orbitState.autoRotate) {
    orbitState.theta += 0.003;
    updateCameraFromOrbit();
  }
  if (renderer) renderer.render(scene, camera);
}

}
setupTriggerSlider('left-trigger-slider','left-trigger-fill','left_trigger');
setupTriggerSlider('right-trigger-slider','right-trigger-fill','right_trigger');

var controllerWrap=document.getElementById('controller-wrap');
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}
var sticks={
    left:{zone:document.getElementById('stick-zone-left'),knob:document.getElementById('stick-knob-left'),defaultL:'35.5%',defaultT:'65.5%',dragging:false,pointerId:null,setValues:function(sx,sy){gamepad.left_stick_x=sx;gamepad.left_stick_y=-sy}},
    right:{zone:document.getElementById('stick-zone-right'),knob:document.getElementById('stick-knob-right'),defaultL:'64%',defaultT:'65.5%',dragging:false,pointerId:null,setValues:function(sx,sy){gamepad.right_stick_x=sx;gamepad.right_stick_y=-sy}}
};
function resetStick(s){
    s.dragging=false;
    s.pointerId=null;
    s.setValues(0,0);
    s.knob.style.left=s.defaultL;
    s.knob.style.top=s.defaultT;
    s.knob.style.transform='translate(-50%,-50%)';
}
function updateStickFromPointer(s,cx,cy){
    var wr=controllerWrap.getBoundingClientRect(),zr=s.zone.getBoundingClientRect(),centerX=zr.left+zr.width/2,centerY=zr.top+zr.height/2,dx=cx-centerX,dy=cy-centerY,maxR=Math.min(zr.width,zr.height)*.36,dist=Math.hypot(dx,dy),sc=dist>maxR?maxR/dist:1,cdx=dx*sc,cdy=dy*sc;
    s.setValues(clamp(cdx/maxR,-1,1),clamp(-cdy/maxR,-1,1));
    s.knob.style.left=(zr.left-wr.left+zr.width/2+cdx)/wr.width*100+'%';
    s.knob.style.top=(zr.top-wr.top+zr.height/2+cdy)/wr.height*100+'%';
    s.knob.style.transform='translate(-50%,-50%)';
}
Object.values(sticks).forEach(function(s){
    s.zone.addEventListener('pointerdown',function(e){e.preventDefault();s.dragging=true;s.pointerId=e.pointerId;s.zone.setPointerCapture(e.pointerId);updateStickFromPointer(s,e.clientX,e.clientY)});
});
window.addEventListener('pointermove',function(e){
    Object.values(sticks).forEach(function(s){if(s.dragging&&s.pointerId===e.pointerId)updateStickFromPointer(s,e.clientX,e.clientY)});
});
function handlePointerEnd(e){
    Object.values(sticks).forEach(function(s){if(s.dragging&&s.pointerId===e.pointerId)resetStick(s)});
}
window.addEventListener('pointerup',handlePointerEnd);
window.addEventListener('pointercancel',handlePointerEnd);
window.addEventListener('blur',function(){Object.values(sticks).forEach(resetStick)});

// UI Float Card
(function(){
    var card=document.getElementById('gamepad-float-card'),tb=document.getElementById('gamepad-titlebar'),cb=document.getElementById('gp-collapse-btn'),body=document.getElementById('gamepad-card-body'),rh=document.getElementById('gamepad-resize-handle'),collapsed=false,sw=null,sh=null;
    cb.addEventListener('click',function(e){
        e.stopPropagation();
        collapsed=!collapsed;
        if(collapsed){
            sw=card.style.width||null;
            sh=card.style.height||null;
            body.style.display='none';
            rh.style.display='none';
            card.style.height='auto';
            cb.textContent='+';
        }else{
            body.style.display='';
            rh.style.display='';
            if(sw)card.style.width=sw;
            if(sh)card.style.height=sh;
            cb.textContent='\u2212';
        }
    });
    var dr=false,dox=0,doy=0;
    tb.addEventListener('pointerdown',function(e){
        if(e.target===cb)return;
        dr=true;
        var r=card.getBoundingClientRect();
        dox=e.clientX-r.left;
        doy=e.clientY-r.top;
        tb.setPointerCapture(e.pointerId);
        e.preventDefault();
    });
    tb.addEventListener('pointermove',function(e){
        if(!dr)return;
        card.style.left=Math.max(0,Math.min(window.innerWidth-card.offsetWidth,e.clientX-dox))+'px';
        card.style.top=Math.max(0,Math.min(window.innerHeight-40,e.clientY-doy))+'px';
        card.style.right='auto';
        card.style.bottom='auto';
    });
    tb.addEventListener('pointerup',function(){dr=false});
    tb.addEventListener('pointercancel',function(){dr=false});
    
    var cr=false,crx=0,cry=0,crw=0,crh=0;
    rh.addEventListener('pointerdown',function(e){
        cr=true;
        crx=e.clientX;
        cry=e.clientY;
        crw=card.offsetWidth;
        crh=card.offsetHeight;
        rh.setPointerCapture(e.pointerId);
        e.preventDefault();
        e.stopPropagation();
    });
    rh.addEventListener('pointermove',function(e){
        if(!cr)return;
        card.style.width=Math.max(240,crw+(e.clientX-crx))+'px';
        card.style.height=Math.max(80,crh+(e.clientY-cry))+'px';
    });
    rh.addEventListener('pointerup',function(){cr=false});
    rh.addEventListener('pointercancel',function(){cr=false});
})();

// Keyboard Controls
window.addEventListener('keydown',function(e){
    if(e.target===codeEditor)return;
    if(e.code==='Space')setButtonState('a',true,'btn-a-visual');
    if(e.code==='KeyW')setButtonState('dpad_up',true,'dpad-up');
    if(e.code==='KeyS')setButtonState('dpad_down',true,'dpad-down');
    if(e.code==='KeyA')setButtonState('dpad_left',true,'dpad-left');
    if(e.code==='KeyD')setButtonState('dpad_right',true,'dpad-right');
});
window.addEventListener('keyup',function(e){
    if(e.code==='Space')setButtonState('a',false,'btn-a-visual');
    if(e.code==='KeyW')setButtonState('dpad_up',false,'dpad-up');
    if(e.code==='KeyS')setButtonState('dpad_down',false,'dpad-down');
    if(e.code==='KeyA')setButtonState('dpad_left',false,'dpad-left');
    if(e.code==='KeyD')setButtonState('dpad_right',false,'dpad-right');
});

// Boot Sequence
window.addEventListener('load', function() {
  if (customCode) {
    codeEditor.value = customCode;
  }
  updateCode(codeEditor.value);
  initRobot3D();
  animateRobot();
  runAnalysis();
  Object.values(sticks).forEach(resetStick);
});
</script>
</body>
</html>
