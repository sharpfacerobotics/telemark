<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unit 12 - Challenge 2 - Heading Display</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<script src="./simulator_base.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #0b1020;
    color: #e2e8f0;
    font-family: Inter, Arial, sans-serif;
    overflow: hidden;
}

#challenge-root {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

#viewer-wrap {
    flex: 1;
    min-height: 420px;
    position: relative;
    background:
        radial-gradient(circle at top, #18233d 0%, #0b1020 65%);
    border-top: 1px solid #334155;
    border-bottom: 1px solid #334155;
}

#viewer {
    width: 100%;
    height: 100%;
}

#hud {
    position: absolute;
    top: 14px;
    left: 14px;
    width: 320px;
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 14px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 24px rgba(0,0,0,0.45);
}

.h-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 10px;
}

.h-row {
    margin-bottom: 10px;
}

.label {
    color: #94a3b8;
    font-size: 12px;
    margin-bottom: 4px;
}

.big {
    font-size: 28px;
    font-weight: 700;
}

.green {
    color: #22c55e;
}

.red {
    color: #ef4444;
}

.yellow {
    color: #facc15;
}

.bar {
    width: 100%;
    height: 14px;
    border-radius: 999px;
    background: #1e293b;
    overflow: hidden;
    border: 1px solid #334155;
}

.bar-fill {
    height: 100%;
    background: linear-gradient(90deg,#22c55e,#06b6d4);
    width: 0%;
}

#condition-box {
    margin-top: 14px;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 10px;
    background: rgba(2,6,23,0.7);
}

.cond {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 14px;
}

#success {
    position: absolute;
    top: 18px;
    right: 18px;
    background: rgba(34,197,94,0.18);
    border: 1px solid #22c55e;
    color: #86efac;
    padding: 14px;
    border-radius: 14px;
    display: none;
    width: 320px;
    font-weight: 600;
}

#wrap-indicator {
    position: absolute;
    bottom: 18px;
    right: 18px;
    background: rgba(250,204,21,0.12);
    border: 1px solid #facc15;
    color: #fde68a;
    border-radius: 10px;
    padding: 10px 14px;
    display: none;
}

    canvas {
        display: block;
    }

    #sim-right-panel #hud {
        flex: 0 1 auto;
        min-height: 0;
        max-height: clamp(190px, 34vh, 330px);
        overflow-y: auto;
        position: static;
        width: auto;
        margin: 10px;
    }

    #sim-right-panel #sim-scene-container {
        flex: 1 0 clamp(360px, 58vh, 560px);
        min-height: 360px;
    }

    #sim-right-panel #heading-history {
        height: 74px;
        width: 100%;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #020617;
        margin-top: 8px;
    }
    </style>
</head>
<body>

<div id="challenge-root">
    <div id="viewer-wrap">
        <div id="viewer"></div>

        <div id="hud">
            <div class="h-title">
                <i class="fa-solid fa-compass"></i>
                Heading Alignment
            </div>

            <div class="h-row">
                <div class="label">HEADING</div>
                <div class="big" id="headingText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">UNWRAPPED HEADING</div>
                <div class="big yellow" id="unwrapText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">ALIGNMENT STATUS</div>
                <div class="big green" id="alignText">ALIGNED</div>
            </div>

            <div class="h-row">
                <div class="label">ALIGNMENT ZONE ±10°</div>
                <div class="bar">
                    <div class="bar-fill" id="headingBar"></div>
                </div>
            </div>

            <div id="condition-box">
                <div class="cond">
                    <span>Math.abs(heading)</span>
                    <span id="absVal">0.0</span>
                </div>

                <div class="cond">
                    <span>&lt;= 10.0</span>
                    <span id="compareVal" class="green">true</span>
                </div>

                <div class="cond">
                    <span>isAligned</span>
                    <span id="alignedVal" class="green">true</span>
                </div>
            </div>
        </div>

        <div id="success">
            <i class="fa-solid fa-circle-check"></i>
            Challenge Complete! Heading display and alignment check working correctly.
        </div>

        <div id="wrap-indicator">
            <i class="fa-solid fa-arrows-rotate"></i>
            Heading wrapped across ±180°
        </div>
    </div>
</div>

<script>
function createHeadingPanel() {
    const right = document.getElementById("sim-right-panel");
    const sceneContainer = document.getElementById("sim-scene-container");

    if (right && !document.getElementById("hud")) {
        const hud = document.createElement("div");
        hud.id = "hud";
        hud.innerHTML = `
            <div class="h-title">
                <i class="fa-solid fa-compass"></i>
                Heading Alignment
            </div>

            <div class="h-row">
                <div class="label">HEADING</div>
                <div class="big" id="headingText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">RAW YAW (-180° to 180°)</div>
                <div class="big yellow" id="rawYawText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">UNWRAPPED HEADING</div>
                <div class="big yellow" id="unwrapText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">START</div>
                <div class="big green" id="startText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">OFFSET</div>
                <div class="big" id="offsetText">0.0°</div>
            </div>

            <div class="h-row">
                <div class="label">ALIGNMENT STATUS</div>
                <div class="big green" id="alignText">ALIGNED</div>
            </div>

            <div class="h-row">
                <div class="label">ZONE: ±10.0°</div>
                <div class="bar">
                    <div class="bar-fill" id="headingBar"></div>
                </div>
            </div>

            <canvas id="heading-history" width="300" height="74"></canvas>

            <div id="condition-box">
                <div class="cond">
                    <span>Math.abs(heading)</span>
                    <span id="absVal">0.0</span>
                </div>

                <div class="cond">
                    <span>&lt;= 10.0</span>
                    <span id="compareVal" class="green">true</span>
                </div>

                <div class="cond">
                    <span>isAligned</span>
                    <span id="alignedVal" class="green">true</span>
                </div>
            </div>
        `;
        right.appendChild(hud);
    }

    if (sceneContainer && !document.getElementById("success")) {
        const success = document.createElement("div");
        success.id = "success";
        success.innerHTML =
            '<i class="fa-solid fa-circle-check"></i> Challenge Complete! Heading display and alignment check working correctly.';
        sceneContainer.appendChild(success);
    }

    if (sceneContainer && !document.getElementById("wrap-indicator")) {
        const wrap = document.createElement("div");
        wrap.id = "wrap-indicator";
        wrap.innerHTML =
            '<i class="fa-solid fa-arrows-rotate"></i> Heading wrapped across ±180°';
        sceneContainer.appendChild(wrap);
    }
}

window.onSimulatorReady = () => {

    const starterCode = `@TeleOp(name="Heading_Display")
public class HeadingDisplay extends OpMode {

    IMU imu;

    @Override
    public void init() {
        imu = hardwareMap.get(IMU.class, "imu");

        // TODO: configure and initialize the IMU for a flat hub mount.
        telemetry.addData("Status", "IMU needs configuration");
    }

    @Override
    public void loop() {
        double heading = 0.0;
        boolean isAligned = false;

        // TODO: read yaw in degrees.
        // TODO: true when the robot is within 10.0 degrees of zero.
        telemetry.addData("Heading",   heading);
        telemetry.addData("isAligned", isAligned);
        telemetry.update();
    }
}`;

    const requirements = [
        "Map IMU with hardwareMap.get(IMU.class, \"imu\")",
        "Initialize IMU with LogoFacingDirection.UP and UsbFacingDirection.FORWARD",
        "Call imu.getRobotYawPitchRollAngles() in loop()",
        "Use getYaw(AngleUnit.DEGREES)",
        "Display heading with telemetry.addData()",
        "Declare and compute boolean isAligned",
        "Use Math.abs(heading) for the comparison",
        "Use the exact 10.0 degree threshold",
        "Display isAligned with telemetry.addData()"
    ];

    if (window.setCode) {
        setCode(starterCode);
    }

    if (window.setChallenge) {
        setChallenge(
            "Heading Display and Alignment Check",
            "Use the IMU heading to determine if the robot is aligned within ±10 degrees.",
            requirements
        );
    }

    if (window.setBadges) {
        setBadges([
            { iconClass: "fa-solid fa-compass", label: "IMU", active: true },
            { iconClass: "fa-solid fa-display", label: "Telemetry", active: true },
            { iconClass: "fa-solid fa-gamepad", label: "Gamepad", active: true }
        ]);
    }

    if (window.setActiveInputs) {
        setActiveInputs(["left_stick_x", "right_stick_x"]);
    }

    createHeadingPanel();

    if (
        window.hardwareMap &&
        typeof hardwareMap.registerIMU === "function"
    ) {
        hardwareMap.registerIMU("imu");
    }

    // Use the scene/camera/renderer that simulator_base.js already created
    const scene    = window.scene;
    const camera   = window.camera;
    const renderer = window.renderer;

    if (!scene || !camera || !renderer || typeof THREE === "undefined") {
        console.error("Three.js scene unavailable – simulator_base not ready.");
        return;
    }

    // Top-down orthographic-style view
    camera.position.set(0, 30, 0);
    camera.lookAt(0, 0, 0);

    // Replace the base field with our own
    if (window.setFieldVisible) {
        setFieldVisible(false);
    }

    let robot;
    let compassGroup;
    let alignmentArc;
    let headingNeedle;

    let currentHeading   = 0;
    let unwrappedHeading = 0;
    let startHeading     = 0;
    const headingHistory = [];

    function buildField() {

        const field = new THREE.Mesh(
            new THREE.PlaneGeometry(40, 40),
            new THREE.MeshStandardMaterial({
                color: 0x1a1a2e,
                metalness: 0.5,
                roughness: 0.7
            })
        );

        field.rotation.x = -Math.PI / 2;

        scene.add(field);

        const grid = new THREE.GridHelper(
            40,
            20,
            0x334155,
            0x1e293b
        );

        scene.add(grid);
    }

    function buildCompass() {

        compassGroup = new THREE.Group();

        const ring = new THREE.Mesh(
            new THREE.RingGeometry(7.5, 8.2, 64),
            new THREE.MeshBasicMaterial({
                color: 0x64748b,
                side: THREE.DoubleSide
            })
        );

        ring.rotation.x = -Math.PI / 2;

        compassGroup.add(ring);

        alignmentArc = new THREE.Mesh(
            new THREE.RingGeometry(
                6.8,
                7.4,
                64,
                1,
                THREE.MathUtils.degToRad(80),
                THREE.MathUtils.degToRad(20)
            ),
            new THREE.MeshBasicMaterial({
                color: 0x22c55e,
                side: THREE.DoubleSide
            })
        );

        alignmentArc.rotation.x = -Math.PI / 2;

        compassGroup.add(alignmentArc);

        headingNeedle = new THREE.Mesh(
            new THREE.BoxGeometry(
                0.25,
                0.05,
                6
            ),
            new THREE.MeshStandardMaterial({
                color: 0xff6600,
                emissive: 0xff6600,
                emissiveIntensity: 0.8
            })
        );

        headingNeedle.position.z = -3;

        compassGroup.add(headingNeedle);

        scene.add(compassGroup);
    }

    function buildRobot() {

        robot = new THREE.Group();

        const body = new THREE.Mesh(
            new THREE.BoxGeometry(3, 1, 4),
            new THREE.MeshStandardMaterial({
                color: 0xff6600,
                metalness: 0.8,
                roughness: 0.25
            })
        );

        robot.add(body);

        const front = new THREE.Mesh(
            new THREE.BoxGeometry(
                2,
                0.2,
                0.4
            ),
            new THREE.MeshStandardMaterial({
                color: 0x00ffff,
                emissive: 0x00ffff,
                emissiveIntensity: 0.8
            })
        );

        front.position.z = -2.2;
        front.position.y = 0.25;

        robot.add(front);

        robot.position.y = 0.5;

        scene.add(robot);
    }

    function updateVisuals() {

        const heading = currentHeading;
        const headingText = document.getElementById("headingText");
        const rawYawText = document.getElementById("rawYawText");
        const unwrapText = document.getElementById("unwrapText");
        const startText = document.getElementById("startText");
        const offsetText = document.getElementById("offsetText");
        const alignEl = document.getElementById("alignText");
        const absEl = document.getElementById("absVal");
        const compareEl = document.getElementById("compareVal");
        const alignedVal = document.getElementById("alignedVal");
        const headingBar = document.getElementById("headingBar");

        if (
            !headingText ||
            !rawYawText ||
            !unwrapText ||
            !startText ||
            !offsetText ||
            !alignEl ||
            !absEl ||
            !compareEl ||
            !alignedVal ||
            !headingBar
        ) {
            return;
        }

        if (robot) {
            robot.rotation.y =
                THREE.MathUtils.degToRad(heading);
        }

        if (headingNeedle) {
            headingNeedle.rotation.y =
                THREE.MathUtils.degToRad(heading);
        }

        const aligned =
            Math.abs(heading) <= 10.0;

        headingText.textContent =
            "HEADING: " + heading.toFixed(1) + "°";

        rawYawText.textContent =
            heading.toFixed(1) + "°";

        unwrapText.textContent =
            ((heading + 360) % 360).toFixed(1) + "°";

        startText.textContent =
            startHeading.toFixed(1) + "°";

        offsetText.textContent =
            (heading - startHeading).toFixed(1) + "°";

        alignEl.textContent =
            aligned
                ? "ALIGNED"
                : "NOT ALIGNED";

        alignEl.className =
            "big " + (aligned ? "green" : "red");

        const absVal =
            Math.abs(heading);

        absEl.textContent =
            absVal.toFixed(1);

        const compare =
            absVal <= 10.0;

        compareEl.textContent =
            compare;

        compareEl.className =
            compare
                ? "green"
                : "red";

        alignedVal.textContent =
            aligned;

        alignedVal.className =
            aligned
                ? "green"
                : "red";

        const pct =
            Math.min(
                100,
                (absVal / 180) * 100
            );

        headingBar.style.width =
            pct + "%";

        if (alignmentArc) {
            alignmentArc.material.color.set(
                aligned
                    ? 0x22c55e
                    : 0x334155
            );
        }

        headingHistory.push(heading);

        while (headingHistory.length > 100) {
            headingHistory.shift();
        }

        drawHistory();
        validateCode();
    }

    function drawHistory() {
        const canvas = document.getElementById("heading-history");
        if (!canvas || !canvas.getContext) return;

        const ctx = canvas.getContext("2d");
        const w = canvas.width;
        const h = canvas.height;

        ctx.clearRect(0,0,w,h);
        ctx.strokeStyle = "#334155";
        ctx.beginPath();
        ctx.moveTo(0,h / 2);
        ctx.lineTo(w,h / 2);
        ctx.stroke();

        ctx.strokeStyle = "#ff6600";
        ctx.beginPath();

        headingHistory.forEach((value,index) => {
            const x = headingHistory.length <= 1
                ? 0
                : index / (headingHistory.length - 1) * w;
            const y = h / 2 - value / 180 * (h / 2 - 6);

            if (index === 0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        });

        ctx.stroke();
    }

    function validateCode() {

        if (!window.getCode) {
            return;
        }

        const code = getCode();

        const checks = [
            code.includes('hardwareMap.get(IMU.class'),
            code.includes('imu.initialize'),
            code.includes('getRobotYawPitchRollAngles'),
            code.includes('getYaw(AngleUnit.DEGREES)'),
            code.includes('telemetry.addData("Heading"'),
            code.includes('boolean isAligned'),
            code.includes('Math.abs(heading)'),
            code.includes('<= 10.0'),
            code.includes('telemetry.addData("isAligned"')
        ];

        const success =
            checks.every(Boolean);

        if (window.setRequirement) {
            checks.forEach((passed,index) => {
                setRequirement(index,passed);
            });
        }

        const successEl = document.getElementById("success");

        if (successEl) {
            successEl.style.display =
                success ? "block" : "none";
        }
    }

    function logicLoop() {

        const gamepad =
            window.gamepad || {};

        const rotate =
            gamepad.right_stick_x || 0;

        currentHeading += rotate * 1.8;
        unwrappedHeading += rotate * 1.8;

        if (currentHeading > 180) {

            currentHeading -= 360;
            showWrap();
        }

        if (currentHeading < -180) {

            currentHeading += 360;
            showWrap();
        }

        updateVisuals();
    }

    function showWrap() {

        const el =
            document.getElementById(
                "wrap-indicator"
            );

        if (!el) return;

        el.style.display = "block";

        clearTimeout(el._timer);

        el._timer = setTimeout(() => {
            el.style.display = "none";
        }, 1200);
    }

    function onResize() {

        if (!renderer || !camera) {
            return;
        }

        camera.updateProjectionMatrix();
    }

    if (
        window.hardwareMap &&
        typeof hardwareMap.onIMUHeading ===
            "function"
    ) {

        hardwareMap.onIMUHeading(
            (heading) => {
                currentHeading = heading;
            }
        );
    }

    if (
        window.hardwareMap &&
        typeof hardwareMap.onIMU === "function"
    ) {
        hardwareMap.onIMU((name,data) => {
            if (name === "imu" && data && typeof data.heading === "number") {
                currentHeading = data.heading;
                unwrappedHeading = data.heading;
                updateVisuals();
            }
        });
    }

    window.updateHeadingVisual =
        function(heading) {
            currentHeading = heading;
        };

    window.onRun = function() {
        currentHeading = 0;
        unwrappedHeading = 0;
        startHeading = 0;
        headingHistory.length = 0;
        updateVisuals();
    };

    window.onStop = function() {};

    window.onReset = function() {

        currentHeading = 0;
        unwrappedHeading = 0;

        if (robot) {
            robot.rotation.y = 0;
        }

        updateVisuals();
    };

    // Build the scene objects and start the logic loop
    buildField();
    buildCompass();
    buildRobot();

    window.addEventListener("resize", onResize);

    setInterval(logicLoop, 16);
};
</script>



</body>
</html>
