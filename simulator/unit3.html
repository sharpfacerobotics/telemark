<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telemark Unit 3 Simulator</title>
  
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />

  <style>
    :root {
      --bg: #1e1e1e;
      --panel: #252526;
      --panel-2: #121212;
      --text: #d4d4d4;
      --muted: #9aa0a6;
      --accent: #007acc;
      --accent-2: #0098ff;
      --danger: #cc0000;
      --good: #00cc00;
      --warn: #ffcc00;
      --border: #333;
      
      /* Type Colors for Inspector */
      --type-string: #007acc;
      --type-double: #00cc00;
      --type-int: #ff8c00;
      --type-boolean: #d7ba7d;
    }

    /* ── Change 3: Custom Scrollbars ─────────────────────────────────────── */
    * {
      scrollbar-width: thin;
      scrollbar-color: #444 #1e1e1e;
    }
    *::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    *::-webkit-scrollbar-track {
      background: #1e1e1e;
    }
    *::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 3px;
    }
    *::-webkit-scrollbar-thumb:hover {
      background: #666;
    }
    *::-webkit-scrollbar-corner {
      background: #1e1e1e;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; display: flex; height: 100vh; overflow: hidden;
      background: var(--bg); color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Editor Side */
    #editor-container {
      width: 55%; min-width: 320px; height: 100%;
      display: flex; flex-direction: column; background: #1b1b1b;
    }
    .editor-header {
      padding: 12px 14px; background: #111; border-bottom: 1px solid #2f2f2f;
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    .editor-title { font-weight: 700; color: white; }
    .editor-subtitle { color: #9aa0a6; font-size: 0.9rem; }

    /* Code Overlay */
    .code-wrapper { position: relative; flex: 1; overflow: hidden; background: #1e1e1e; }
    #code-editor, #highlighting {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; margin: 0; padding: 16px;
      font-family: "Consolas", "Courier New", monospace; font-size: 14px; line-height: 1.5;
      tab-size: 4; white-space: pre; border: 0; outline: none;
    }
    #code-editor { color: transparent; background: transparent; caret-color: white; z-index: 2; resize: none; overflow: auto; }
    #highlighting { z-index: 1; overflow: hidden; }
    #highlighting code { font-family: inherit; font-size: inherit; line-height: inherit; text-shadow: none; }
    
    #resizer { width: 6px; background: #333; cursor: col-resize; z-index: 10; transition: background 0.2s; }
    #resizer:hover, #resizer.active { background: var(--accent); }

    /* Driver Station Side */
    #ds-container {
      flex: 1; display: flex; flex-direction: column; background: var(--panel-2);
      padding: 15px; overflow-y: auto; min-width: 360px; gap: 12px;
    }
    .ds-header { background: var(--panel); padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
    .ds-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; }
    .ds-row:last-child { margin-bottom: 0; }
    .ds-title { font-size: 1.15rem; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ds-state { font-family: monospace; font-weight: 700; font-size: 1.05rem; color: var(--danger); }
    .ds-timer { font-family: monospace; font-size: 1.05rem; color: #569cd6; }

    /* Controls */
    .controls { display: flex; gap: 10px; }
    button { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.1s ease; user-select: none; }
    button:active { transform: translateY(1px); }
    #btn-main { background: var(--accent); color: white; }
    #btn-main:hover { background: var(--accent-2); }
    #btn-main:disabled { background: #444; color: #888; cursor: not-allowed; transform: none; }
    #btn-stop { background: var(--danger); color: white; }
    #btn-stop:hover { filter: brightness(1.1); }

    /* Variable Inspector */
    .inspector-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .inspector-title { font-weight: bold; margin-bottom: 8px; color: #fff; font-size: 1.05rem; display: flex; justify-content: space-between; align-items: center; }
    .var-row { display: flex; align-items: center; background: #1a1a1a; padding: 8px; border-radius: 6px; margin-bottom: 6px; font-family: monospace; font-size: 0.95rem; }
    .var-row:last-child { margin-bottom: 0; }
    .var-badge { padding: 3px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-right: 10px; color: #000; width: 65px; text-align: center; }
    .badge-String { background: var(--type-string); color: #fff; }
    .badge-double { background: var(--type-double); }
    .badge-int { background: var(--type-int); color: #fff; }
    .badge-boolean { background: var(--type-boolean); }
    .var-name { color: #9cdcfe; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .var-val { color: #d4d4d4; margin-right: 15px; width: 60px; text-align: right; }
    .var-visual { width: 80px; display: flex; align-items: center; justify-content: flex-end; }
    
    /* Variable Visualizer Assets */
    .vis-toggle { width: 40px; height: 20px; border-radius: 10px; background: var(--danger); position: relative; transition: 0.2s; }
    .vis-toggle.on { background: var(--good); }
    .vis-toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: 0.2s; }
    .vis-toggle.on::after { left: 22px; }
    .vis-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 6px; overflow: hidden; position: relative; }
    .vis-bar-fill { height: 100%; background: var(--accent-2); width: 0%; transition: width 0.1s; position: absolute; left: 50%; transform: translateX(-50%); }
    .vis-bar-fill.positive { left: 50%; transform: none; }
    .vis-bar-fill.negative { right: 50%; left: auto; background: var(--warn); transform: none;}

    /* ── Change 1: Spinning Motor Indicator ──────────────────────────────── */
    .motor-visual {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 15px;
      font-family: monospace;
      font-size: 0.9rem;
      background: #000;
      padding: 14px 10px 10px;
      border-radius: 6px;
    }

    .motor-spinning-container {
      position: relative;
      width: 90px;
      height: 90px;
    }

    /* Outer motor housing */
    .motor-housing {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #555, #2a2a2a 50%, #1a1a1a 100%);
      border: 3px solid #3a3a3a;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.6), 0 2px 10px rgba(0,0,0,0.5);
    }

    /* Inner ring / stator */
    .motor-stator {
      position: absolute;
      top: 12%;
      left: 12%;
      width: 76%;
      height: 76%;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #444, #222 70%);
      border: 2px solid #3d3d3d;
    }

    /* Rotor that spins */
    .motor-rotor {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60%;
      height: 60%;
      transform: translate(-50%, -50%);
      animation: none;
    }

    .motor-rotor.spinning-cw {
      animation: spin-cw var(--spin-duration, 2s) linear infinite;
    }
    .motor-rotor.spinning-ccw {
      animation: spin-ccw var(--spin-duration, 2s) linear infinite;
    }

    @keyframes spin-cw {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes spin-ccw {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(-360deg); }
    }

    /* Rotor arms - cross shape */
    .rotor-arm {
      position: absolute;
      background: #777;
      border-radius: 2px;
    }
    .rotor-arm-h {
      width: 100%;
      height: 16%;
      top: 42%;
      left: 0;
      background: linear-gradient(to bottom, #888, #555);
    }
    .rotor-arm-v {
      width: 16%;
      height: 100%;
      left: 42%;
      top: 0;
      background: linear-gradient(to right, #888, #555);
    }

    /* Center hub dot */
    .motor-hub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #aaa, #555 70%);
      border: 2px solid #666;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 2;
    }

    /* Directional indicator notch on the rotor */
    .rotor-notch {
      position: absolute;
      top: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 8px;
      height: 8px;
      background: #00cc00;
      border-radius: 50%;
      box-shadow: 0 0 6px #00cc0088;
    }

    .motor-power-label {
      margin-top: 8px;
      font-family: monospace;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .motor-power-label .label-text {
      color: #aaa;
    }
    .motor-power-label .power-value {
      color: #00ff00;
      font-weight: bold;
      min-width: 45px;
      text-align: center;
    }

    /* ── Change 2: Floating Resizable Gamepad Card ───────────────────────── */
    .gamepad-float-card {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 420px;
      min-width: 260px;
      min-height: 48px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    .gamepad-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #1a1a1a;
      border-bottom: 1px solid var(--border);
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
    }
    .gamepad-titlebar:active {
      cursor: grabbing;
    }
    .gamepad-titlebar-label {
      font-weight: 700;
      font-size: 0.95rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gamepad-titlebar-label::before {
      content: '🎮';
    }
    .gamepad-collapse-btn {
      flex: none;
      width: 28px;
      height: 28px;
      padding: 0;
      border-radius: 6px;
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s;
    }
    .gamepad-collapse-btn:hover {
      background: #444;
    }

    .gamepad-card-body {
      padding: 14px;
      overflow: hidden;
      flex: 1;
    }

    .gamepad-card-body.collapsed {
      display: none;
    }

    .gamepad-resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 18px;
      height: 18px;
      cursor: nwse-resize;
      z-index: 10;
      background: transparent;
    }
    .gamepad-resize-handle::after {
      content: '';
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 8px;
      height: 8px;
      border-right: 2px solid #666;
      border-bottom: 2px solid #666;
    }

    .controller-wrap {
      width: 100%;
      position: relative;
      aspect-ratio: 768 / 512;
      border-radius: 18px;
      overflow: hidden;
      background: #0f0f0f;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      touch-action: none;
      user-select: none;
    }

    .controller-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      border-radius: 50%;
      touch-action: none;
      user-select: none;
    }

    /* Left stick */
    .stick-zone-left {
      left: 36%; top: 65%;
      width: 17%; height: 24%;
      transform: translate(-50%, -50%);
      background: transparent;
    }

    .stick-base-left {
      position: absolute;
      left: 36%; top: 65%;
      width: 14%; height: 21%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
    }

    .stick-knob-left {
      position: absolute;
      left: 36%; top: 65%;
      width: 9%; height: 13%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #444, #121212 70%);
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.45);
    }

    /* Right stick */
    .stick-zone-right {
      left: 64%; top: 65%;
      width: 17%; height: 24%;
      transform: translate(-50%, -50%);
      background: transparent;
    }

    .stick-base-right {
      position: absolute;
      left: 64%; top: 65%;
      width: 14%; height: 21%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      pointer-events: none;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.12);
    }

    .stick-knob-right {
      position: absolute;
      left: 64%; top: 65%;
      width: 9%; height: 13%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #444, #121212 70%);
      border: 1px solid rgba(255,255,255,0.18);
      pointer-events: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.45);
    }

    .button-overlay {
      border: 2px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.02);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.15);
      transition: transform 0.05s ease, background 0.05s ease, box-shadow 0.05s ease;
      cursor: pointer;
    }

    .button-overlay.pressed {
      transform: scale(0.95);
      background: rgba(255,255,255,0.18);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.25), inset 0 0 20px rgba(255,255,255,0.22);
    }

    .a-btn { left: 75.5%; top: 49%; width: 7%; height: 10%; transform: translate(-10%, -10%); }
    .b-btn  { left: 83%;   top: 38%; width: 7%; height: 10%; transform: translate(-10%, -10%); }
    .x-btn  { left: 68%;   top: 38%; width: 7%; height: 10%; transform: translate(-10%, -10%); }
    .y-btn  { left: 75.5%; top: 27%; width: 7%; height: 10%; transform: translate(-10%, -10%); }

    .small-button {
      width: 5.2%; height: 6.4%;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.14);
      pointer-events: auto;
    }
    .bumper-btn {
      width: 12%;
      height: 6.5%;
      border-radius: 999px 999px 10px 10px;
      pointer-events: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: #ddd;
    }
    .back-btn  { left: 37.5%; top: 28%; transform: translate(-10%, -10%); }
    .left-bumper-btn { left: 18%; top: 9%; transform: translate(-10%, -10%); }
    .mode-btn  { left: 39%;   top: 41%; transform: translate(-10%, -10%); }
    .start-btn { left: 58%;   top: 28%; transform: translate(-10%, -10%); }

    .dpad {
      left: 15%; top: 33%;
      width: 16%; height: 20%;
      transform: translate(-10%, -10%);
      border-radius: 24%;
      pointer-events: none;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
    }

    .telemetry-panel { background: #000; border: 2px solid #444; border-radius: 10px; min-height: 120px; padding: 15px; font-family: monospace; font-size: 0.95rem; overflow-y: auto; color: #00ff00;}
    .telemetry-line { margin: 2px 0; }
    .telemetry-key { color: #4ec9b0; }

    /* Hints */
    #hint-container { display: flex; flex-direction: column; gap: 8px; }
    .hint { display: block; background: rgba(255, 204, 0, 0.12); border-left: 4px solid var(--warn); padding: 10px 12px; color: var(--warn); border-radius: 6px; font-size: 0.92rem; }
    .hint.error { background: rgba(204, 0, 0, 0.12); border-left-color: var(--danger); color: #ff6666; }
  </style>
</head>
<body>

<div id="editor-container">
  <div class="editor-header">
    <div>
      <div class="editor-title">Telemark Unit 3 Simulator</div>
      <div class="editor-subtitle">Java Variables · Variable Tracking · Expressions · Real-time Inspector</div>
    </div>
  </div>

  <div class="code-wrapper">
    <textarea id="code-editor" spellcheck="false"
      oninput="updateCode(this.value); syncScroll(this);"
      onscroll="syncScroll(this);">@TeleOp(name="TeleOpTest", group="Practice")
public class TeleOpTest extends OpMode {
    @Override
    public void init() {
        telemetry.addData("Status", "Initialized");
    }

    @Override
    public void loop() {
        telemetry.addData("Status", "Running");
    }

    @Override
    public void stop() {
        telemetry.addData("Status", "Stopped");
    }
}</textarea>
    <pre id="highlighting" aria-hidden="true"><code class="language-java" id="highlighting-content"></code></pre>
  </div>
</div>

<div id="resizer"></div>

<div id="ds-container">
  <div class="ds-header">
    <div class="ds-row">
      <div class="ds-title" id="opmode-name">Select OpMode...</div>
      <div class="ds-state" id="state-indicator">STOPPED</div>
    </div>
    <div class="ds-row" style="margin-bottom:0;">
      <div style="font-size:0.9rem; color:#aaa;" id="warning-label"></div>
      <div class="ds-timer">Time: <span id="timer-val">0.00</span>s</div>
    </div>
  </div>

  <div class="controls">
    <button id="btn-main" onclick="handleMainButton()">INIT</button>
    <button id="btn-stop" onclick="handleStopButton()">STOP</button>
  </div>

  <div class="inspector-panel">
    <div class="inspector-title">Variable Inspector <span>🔍</span></div>
    <div id="var-list">
      <div style="color: #666; font-style: italic; font-size: 0.9rem;">Variables will appear here when parsed...</div>
    </div>
  </div>

  <!-- Change 1: Spinning Motor Indicator -->
  <div class="motor-visual" id="motor-visual">
    <div class="motor-spinning-container">
      <div class="motor-housing"></div>
      <div class="motor-stator"></div>
      <div class="motor-rotor" id="motor-rotor">
        <div class="rotor-arm rotor-arm-h"></div>
        <div class="rotor-arm rotor-arm-v"></div>
        <div class="rotor-notch"></div>
      </div>
      <div class="motor-hub"></div>
    </div>
    <div class="motor-power-label">
      <span class="label-text">drive.setPower(</span>
      <span class="power-value" id="motor-power-text">0.00</span>
      <span class="label-text">)</span>
    </div>
  </div>

  <div class="telemetry-panel" id="telemetry-log">
    <div style="color:#666; font-style:italic;">Telemetry will appear here...</div>
  </div>

  <div id="hint-container"></div>
</div>

<!-- Change 2: Floating Resizable Gamepad Card -->
<div class="gamepad-float-card" id="gamepad-float-card">
  <div class="gamepad-titlebar" id="gamepad-titlebar">
    <span class="gamepad-titlebar-label">Gamepad 1</span>
    <button class="gamepad-collapse-btn" id="gamepad-collapse-btn" title="Collapse/Expand">−</button>
  </div>
  <div class="gamepad-card-body" id="gamepad-card-body">
    <div class="controller-wrap" id="controller-wrap">
      <img class="controller-img" alt="FTC controller"
        src="https://resource.logitechg.com/w_776,h_437,ar_16:9,c_fill,q_auto,f_auto,dpr_1.0/d_transparent.gif/content/dam/gaming/en/products/f310/f310-feature-3.png">

      <div class="overlay stick-zone-left" id="stick-zone-left"></div>
      <div class="stick-base-left"></div>
      <div class="stick-knob-left" id="stick-knob-left"></div>

      <div class="overlay stick-zone-right" id="stick-zone-right"></div>
      <div class="stick-base-right"></div>
      <div class="stick-knob-right" id="stick-knob-right"></div>

      <div class="overlay button-overlay y-btn"  id="btn-y"        title="Y"></div>
      <div class="overlay button-overlay x-btn"  id="btn-x"        title="X"></div>
      <div class="overlay button-overlay a-btn"  id="btn-a-visual" title="A"></div>
      <div class="overlay button-overlay b-btn"  id="btn-b"        title="B"></div>

      <div class="overlay button-overlay small-button back-btn"  id="btn-back"  title="Back"></div>
      <div class="overlay button-overlay bumper-btn left-bumper-btn" id="btn-left-bumper" title="Left Bumper">LB</div>
      <div class="overlay button-overlay small-button mode-btn"  id="btn-mode"  title="Mode"></div>
      <div class="overlay button-overlay small-button start-btn" id="btn-start" title="Start"></div>

      <div class="overlay dpad"></div>
    </div>
  </div>
  <div class="gamepad-resize-handle" id="gamepad-resize-handle"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-java.min.js"></script>

<script>
// ─── Resizer ────────────────────────────────────────────────────────────────
const resizer   = document.getElementById('resizer');
const leftPanel = document.getElementById('editor-container');
let isResizing  = false;

resizer.addEventListener('mousedown', () => { isResizing = true; resizer.classList.add('active'); });
document.addEventListener('mousemove', (e) => {
  if (!isResizing) return;
  const pct = (e.clientX / window.innerWidth) * 100;
  if (pct > 20 && pct < 80) leftPanel.style.width = pct + '%';
});
document.addEventListener('mouseup', () => { isResizing = false; resizer.classList.remove('active'); });

// ─── Syntax Highlighting ─────────────────────────────────────────────────────
function updateCode(text) {
  const el = document.getElementById('highlighting-content');
  if (text[text.length - 1] === '\n') text += ' ';
  el.innerHTML = text.replace(/&/g, '&amp;').replace(/</g, '&lt;');
  Prism.highlightElement(el);
}

function syncScroll(el) {
  const h = document.getElementById('highlighting');
  h.scrollTop  = el.scrollTop; h.scrollLeft = el.scrollLeft;
}

// ─── Smart Editor ────────────────────────────────────────────────────────────
const codeEditor = document.getElementById('code-editor');

function loadInitialConfig() {
  const params = new URLSearchParams(window.location.search);
  const starterCode = params.get('code');
  if (starterCode) {
    codeEditor.value = starterCode;
  }

  const showMotorVisual = params.get('showMotorVisual');
  if (showMotorVisual !== null) {
    const motorVisual = document.getElementById('motor-visual');
    const normalized = showMotorVisual.trim().toLowerCase();
    const shouldShow = !['0', 'false', 'no', 'off'].includes(normalized);
    if (motorVisual) {
      motorVisual.style.display = shouldShow ? '' : 'none';
    }
  }
}

codeEditor.addEventListener('keydown', function (e) {
  const start = this.selectionStart;
  const end   = this.selectionEnd;

  if (e.key === 'Tab') {
    e.preventDefault();
    this.value = this.value.substring(0, start) + '    ' + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 4;
    updateCode(this.value); runStaticAnalysis();
    return;
  }

  const pairs = { '(': ')', '{': '}', '[': ']', '"': '"', "'": "'" };
  if (pairs[e.key]) {
    e.preventDefault();
    this.value = this.value.substring(0, start) + e.key + pairs[e.key] + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + 1;
    updateCode(this.value); runStaticAnalysis();
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    const before   = this.value.substring(0, start);
    const lastLine = before.split('\n').pop();
    const indent   = lastLine.match(/^\s*/)[0];
    const extra    = lastLine.trimEnd().endsWith('{') ? '    ' : '';
    const insert   = '\n' + indent + extra;
    this.value     = before + insert + this.value.substring(end);
    this.selectionStart = this.selectionEnd = start + insert.length;
    updateCode(this.value); runStaticAnalysis();
    return;
  }
});
codeEditor.addEventListener('input', () => { updateCode(codeEditor.value); runStaticAnalysis(); });

// ─── Simulator State & Inspector ─────────────────────────────────────────────
let currentState  = 'STOPPED';
let intervalId    = null;
let timerId       = null;
let runtimeOffset = 0;

let declaredVars = {};
let activeHints = new Set();

const gamepad = {
  leftStickX: 0, leftStickY: 0,
  rightStickX: 0, rightStickY: 0,
  a: false, b: false, x: false, y: false,
  back: false, start: false, mode: false,
  left_bumper: false, right_bumper: false
};

function getRuntime() { return runtimeOffset === 0 ? 0 : (Date.now() - runtimeOffset) / 1000; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function renderHints() {
    const c = document.getElementById('hint-container');
    c.innerHTML = '';
    activeHints.forEach(h => {
        let cl = (h.includes("cannot hold decimals") || h.includes("outside")) ? "hint error" : "hint";
        c.innerHTML += `<div class="${cl}">${h}</div>`;
    });
}
function addHint(msg) { activeHints.add(msg); }

function parseValue(valStr, type) {
    if (type === 'int') {
        let val = parseFloat(valStr);
        return isNaN(val) ? 0 : Math.trunc(val); 
    }
    if (type === 'double') {
        let val = parseFloat(valStr);
        return isNaN(val) ? 0.0 : val;
    }
    if (type === 'boolean') return (valStr === 'true' || valStr === '1' || valStr === true);
    if (type === 'String') return String(valStr).replace(/^"(.*)"$/, '$1'); 
    return valStr;
}

function formatValue(val, type) {
    if (type === 'String') return `"${val}"`;
    if (type === 'double') return Number(val).toFixed(2);
    if (type === 'boolean') return val ? 'true' : 'false';
    return val;
}

// Bug 1 Fix: Only show value once - in var-val span, visual column shows type-specific visualization only
function renderVariableInspector() {
    const list = document.getElementById('var-list');
    if (Object.keys(declaredVars).length === 0) {
        list.innerHTML = '<div style="color: #666; font-style: italic; font-size: 0.9rem;">No variables declared...</div>';
        return;
    }
    let html = '';
    for (const [name, v] of Object.entries(declaredVars)) {
        let visual = '';
        if (v.type === 'boolean') {
            visual = `<div class="vis-toggle ${v.value ? 'on' : ''}"></div>`;
        } else if (v.type === 'double') {
            let p = Math.max(-1, Math.min(1, v.value || 0));
            let width = Math.abs(p) * 50; 
            let cls = p >= 0 ? 'positive' : 'negative';
            visual = `<div class="vis-bar-bg"><div class="vis-bar-fill ${cls}" style="width: ${width}%"></div></div>`;
        }
        // For int and String, visual column is empty - value is shown only in var-val
        html += `<div class="var-row"><span class="var-badge badge-${v.type}">${v.type}</span><span class="var-name">${name}</span><span class="var-val">${formatValue(v.value, v.type)}</span><div class="var-visual">${visual}</div></div>`;
    }
    list.innerHTML = html;
}

// ── Change 1: Spinning Motor Visual ─────────────────────────────────────────
function updateMotorVisual(power) {
    let p = parseFloat(power);
    if (isNaN(p)) p = 0;
    if (p > 1.0 || p < -1.0) addHint("SDK will clamp this to ±1.0");
    p = Math.max(-1.0, Math.min(1.0, p));

    const rotor = document.getElementById('motor-rotor');
    const powerText = document.getElementById('motor-power-text');
    powerText.innerText = p.toFixed(2);

    // Update power text color
    if (p === 0) {
      powerText.style.color = '#888';
    } else if (p > 0) {
      powerText.style.color = '#00ff00';
    } else {
      powerText.style.color = '#ffcc00';
    }

    if (Math.abs(p) < 0.001) {
      // Stopped
      rotor.className = 'motor-rotor';
      rotor.style.removeProperty('--spin-duration');
    } else {
      // Map power to spin duration: higher power = faster spin = shorter duration
      // At |power| = 1.0, duration = 0.3s (very fast)
      // At |power| = 0.01, duration = 4s (very slow)
      const duration = Math.max(0.15, 0.3 / Math.abs(p));
      rotor.style.setProperty('--spin-duration', duration + 's');

      if (p > 0) {
        rotor.className = 'motor-rotor spinning-cw';
      } else {
        rotor.className = 'motor-rotor spinning-ccw';
      }
    }
}

function evaluateExpression(expr) {
    let safeExpr = expr.trim();
    safeExpr = safeExpr.replace(/gamepad1\.left_stick_x/g, String(gamepad.leftStickX));
    safeExpr = safeExpr.replace(/gamepad1\.left_stick_y/g, String(gamepad.leftStickY));
    safeExpr = safeExpr.replace(/gamepad1\.right_stick_x/g, String(gamepad.rightStickX));
    safeExpr = safeExpr.replace(/gamepad1\.right_stick_y/g, String(gamepad.rightStickY));
    safeExpr = safeExpr.replace(/gamepad1\.a/g, String(gamepad.a));
    safeExpr = safeExpr.replace(/gamepad1\.b/g, String(gamepad.b));
    safeExpr = safeExpr.replace(/gamepad1\.x/g, String(gamepad.x));
    safeExpr = safeExpr.replace(/gamepad1\.y/g, String(gamepad.y));
    safeExpr = safeExpr.replace(/gamepad1\.left_bumper/g, String(gamepad.left_bumper));
    safeExpr = safeExpr.replace(/gamepad1\.right_bumper/g, String(gamepad.right_bumper));
    safeExpr = safeExpr.replace(/getRuntime\(\)/g, String(getRuntime().toFixed(2)));

    // Sort variable names by length to avoid partial replacement bugs (e.g. speed vs targetSpeed)
    const varNames = Object.keys(declaredVars).sort((a,b) => b.length - a.length);
    varNames.forEach(vName => {
        const val = declaredVars[vName].value;
        const rep = typeof val === 'string' ? `"${val}"` : val;
        const regex = new RegExp(`\\b${vName}\\b`, 'g');
        safeExpr = safeExpr.replace(regex, rep);
    });

    if (/^".*"$/.test(safeExpr)) return safeExpr.slice(1, -1);
    try { return Function(`"use strict"; return (${safeExpr});`)(); } catch { return safeExpr; }
}

function runStaticAnalysis() {
    const code = codeEditor.value;
    activeHints.clear();
    declaredVars = {};

    // Base hints
    if(!/@TeleOp|@Autonomous/.test(code)) addHint("Your class won't appear on the Driver Station without an annotation.");
    if(!/telemetry\.addData/.test(code)) addHint("Use telemetry.addData() to send data to the Driver Station");
    const nameMatch = /@(?:TeleOp|Autonomous)\s*\(\s*name\s*=\s*"([^"]+)"/.exec(code);
    document.getElementById('opmode-name').textContent = nameMatch ? nameMatch[1] : 'Unnamed OpMode';
    document.getElementById('warning-label').textContent = /@Disabled/.test(code) ? '⚠ @Disabled' : '';

    // Find Variable Declarations globally
    const declRegex = /(String|double|boolean|int)\s+([a-zA-Z_]\w*)\s*(?:=\s*([^;]+))?;/g;
    let match;
    while ((match = declRegex.exec(code)) !== null) {
        let type = match[1];
        let name = match[2];
        let rawVal = match[3] || (type === 'String' ? '""' : '0');
        
        if (type === 'int' && rawVal.includes('.')) addHint("int cannot hold decimals — this will be truncated to 0. Use double instead.");
        let val = evaluateExpression(rawVal);
        declaredVars[name] = { type: type, value: parseValue(val, type) };
    }
    renderHints();
    renderVariableInspector();
}

function getMethodBody(code, methodName) {
  const headerRe = new RegExp(`\\bvoid\\s+${methodName}\\s*\\([^)]*\\)\\s*\\{`, 'm');
  const headerMatch = headerRe.exec(code);
  if (!headerMatch) return null;
  let idx = headerMatch.index + headerMatch[0].length;
  let depth = 1, inStr = false, strCh = null, escaped = false;
  for (; idx < code.length; idx++) {
    const ch = code[idx];
    if (inStr) {
      if (escaped) { escaped = false; continue; }
      if (ch === '\\') { escaped = true; continue; }
      if (ch === strCh) { inStr = false; continue; }
      continue;
    }
    if (ch === '"' || ch === "'") { inStr = true; strCh = ch; continue; }
    if (ch === '{') depth++;
    else if (ch === '}') { if (--depth === 0) return code.slice(headerMatch.index + headerMatch[0].length, idx); }
  }
  return null;
}

function executeMethod(methodName) {
  const code = codeEditor.value;
  let body = getMethodBody(code, methodName);
  if (!body) return;

  if (methodName === 'start' && /resetRuntime\(\)/.test(body)) runtimeOffset = Date.now();

  // Evaluate simple if-statements for logic
  body = body.replace(/if\s*\(\s*gamepad1\.([a-z_]+)\s*\)\s*\{([\s\S]*?)\}\s*(?:else\s*\{([\s\S]*?)\})?/g, (m, buttonName, ifBody, elseBody) => {
      if (!Object.prototype.hasOwnProperty.call(gamepad, buttonName)) {
        return m;
      }
      return gamepad[buttonName] ? ifBody : (elseBody || '');
  });

  // Strip braces that might remain from basic blocks to read lines sequentially
  let lines = body.replace(/[{}]/g, '').split(';');
  let telemetryLines = [];

  for (let line of lines) {
      line = line.trim();
      if (!line) continue;

      // Variable Assignment Check
      const assignMatch = line.match(/^(?:String|double|boolean|int)?\s*([a-zA-Z_]\w*)\s*=\s*(.+)$/);
      if (assignMatch) {
          let varName = assignMatch[1];
          let expr = assignMatch[2];
          let val = evaluateExpression(expr);
          if (declaredVars[varName]) {
              let type = declaredVars[varName].type;
              if (type === 'int' && String(val).includes('.')) addHint("Integer division discards the remainder");
              declaredVars[varName].value = parseValue(val, type);
          } else {
              declaredVars[varName] = { type: 'double', value: val };
          }
      }

      // Motor Power Check
      const powerMatch = line.match(/\.setPower\(([^)]+)\)/);
      if (powerMatch) {
          let param = powerMatch[1].trim();
          if (declaredVars[param] && declaredVars[param].type === 'int') addHint("int passed to setPower() — values will only ever be 0 or 1");
          updateMotorVisual(evaluateExpression(param));
      }

      // Telemetry Check
      const telMatch = line.match(/telemetry\.addData\(\s*"([^"]+)"\s*,\s*([^)]+)\s*\)/);
      if (telMatch) {
          let key = telMatch[1];
          let param = telMatch[2].trim();
          let val = evaluateExpression(param);
          if (declaredVars[param]) val = formatValue(val, declaredVars[param].type);
          if (typeof val === 'number' && !Number.isInteger(val)) val = val.toFixed(2);
          if (typeof val === 'boolean') val = val ? 'true' : 'false';
          telemetryLines.push(`<div class="telemetry-line"><span class="telemetry-key">${key}</span>: ${val}</div>`);
      }
  }

  renderVariableInspector();
  renderHints();
  if (telemetryLines.length > 0) document.getElementById('telemetry-log').innerHTML = telemetryLines.join('');
}

// ─── Lifecycle ───────────────────────────────────────────────────────────────
function setLifecycle(s, color, btnLabel) {
  currentState = s;
  document.getElementById('state-indicator').textContent = s;
  document.getElementById('state-indicator').style.color = color;
  const btn = document.getElementById('btn-main');
  btn.textContent = btnLabel;
  btn.disabled = (s === 'RUNNING');
  if (s === 'RUNNING') {
    timerId = setInterval(() => { document.getElementById('timer-val').textContent = getRuntime().toFixed(2); }, 50);
  }
}

function stopAllIntervals() { clearInterval(intervalId); clearInterval(timerId); intervalId = timerId = null; }

function handleMainButton() {
  if (currentState === 'STOPPED') {
    runStaticAnalysis();
    document.getElementById('telemetry-log').innerHTML = '';
    document.getElementById('timer-val').textContent = '0.00';
    runtimeOffset = 0; updateMotorVisual(0);
    executeMethod('init');
    setLifecycle('INIT_LOOP', '#ffcc00', 'START');
    intervalId = setInterval(() => executeMethod('init_loop'), 100);
  } else if (currentState === 'INIT_LOOP') {
    stopAllIntervals();
    executeMethod('start');
    if (runtimeOffset === 0) runtimeOffset = Date.now();
    setLifecycle('RUNNING', '#00ff00', 'RUNNING');
    intervalId = setInterval(() => executeMethod('loop'), 100);
  }
}

function handleStopButton() {
  if (currentState === 'STOPPED') return;
  stopAllIntervals(); executeMethod('stop'); runtimeOffset = 0;
  document.getElementById('timer-val').textContent = '0.00'; updateMotorVisual(0);
  setLifecycle('STOPPED', '#cc0000', 'INIT');
}

// ─── Gamepad Buttons ─────────────────────────────────────────────────────────
function setButtonState(prop, pressed, elementId) {
  gamepad[prop] = pressed;
  const el = document.getElementById(elementId);
  if (el) el.classList.toggle('pressed', pressed);
}
const buttonMap = [['btn-a-visual', 'a'], ['btn-b', 'b'], ['btn-x', 'x'], ['btn-y', 'y'], ['btn-back', 'back'], ['btn-start', 'start'], ['btn-mode', 'mode'], ['btn-left-bumper', 'left_bumper']];
buttonMap.forEach(([id, prop]) => {
  const el = document.getElementById(id); if (!el) return;
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); setButtonState(prop, true, id); });
  el.addEventListener('pointerup', () => setButtonState(prop, false, id));
  el.addEventListener('pointerleave', () => setButtonState(prop, false, id));
  el.addEventListener('pointercancel', () => setButtonState(prop, false, id));
});

window.addEventListener('keydown', (e) => {
  if (e.target === codeEditor) return;
  if (e.code === 'Space') setButtonState('a', true, 'btn-a-visual');
  if (e.code === 'ShiftLeft') setButtonState('left_bumper', true, 'btn-left-bumper');
});
window.addEventListener('keyup', (e) => {
  if (e.code === 'Space') setButtonState('a', false, 'btn-a-visual');
  if (e.code === 'ShiftLeft') setButtonState('left_bumper', false, 'btn-left-bumper');
});

// ─── Joystick ────────────────────────────────────────────────────────────────
const controllerWrap = document.getElementById('controller-wrap');
const sticks = {
  left: { zone: document.getElementById('stick-zone-left'), knob: document.getElementById('stick-knob-left'), defaultL: '36%', defaultT: '65%', dragging: false, pointerId: null, setValues(sx, sy) { gamepad.leftStickX = sx; gamepad.leftStickY = sy; } },
  right: { zone: document.getElementById('stick-zone-right'), knob: document.getElementById('stick-knob-right'), defaultL: '64%', defaultT: '65%', dragging: false, pointerId: null, setValues(sx, sy) { gamepad.rightStickX = sx; gamepad.rightStickY = sy; } }
};

function resetStick(stick) {
  stick.dragging = false; stick.pointerId = null; stick.setValues(0, 0);
  stick.knob.style.left = stick.defaultL; stick.knob.style.top = stick.defaultT;
  stick.knob.style.transform = 'translate(-50%, -50%)';
}

function updateStickFromPointer(stick, clientX, clientY) {
  const wrapRect = controllerWrap.getBoundingClientRect();
  const zoneRect = stick.zone.getBoundingClientRect();
  const centerX = zoneRect.left + zoneRect.width / 2; const centerY = zoneRect.top + zoneRect.height / 2;
  const dx = clientX - centerX; const dy = clientY - centerY;
  const maxR = Math.min(zoneRect.width, zoneRect.height) * 0.36;
  const dist = Math.hypot(dx, dy); const scale = dist > maxR ? maxR / dist : 1;
  const clampedDx = dx * scale; const clampedDy = dy * scale;
  
  stick.setValues(clamp(clampedDx / maxR, -1, 1), clamp(-clampedDy / maxR, -1, 1));
  
  const knobCx = (zoneRect.left - wrapRect.left + zoneRect.width / 2 + clampedDx) / wrapRect.width * 100;
  const knobCy = (zoneRect.top - wrapRect.top + zoneRect.height / 2 + clampedDy) / wrapRect.height * 100;
  stick.knob.style.left = knobCx + '%'; stick.knob.style.top = knobCy + '%'; stick.knob.style.transform = 'translate(-50%, -50%)';
}

Object.values(sticks).forEach(stick => {
  stick.zone.addEventListener('pointerdown', (e) => { e.preventDefault(); stick.dragging = true; stick.pointerId = e.pointerId; stick.zone.setPointerCapture(e.pointerId); updateStickFromPointer(stick, e.clientX, e.clientY); });
});
window.addEventListener('pointermove', (e) => { Object.values(sticks).forEach(stick => { if (stick.dragging && stick.pointerId === e.pointerId) updateStickFromPointer(stick, e.clientX, e.clientY); }); });
function handlePointerEnd(e) { Object.values(sticks).forEach(stick => { if (stick.dragging && stick.pointerId === e.pointerId) resetStick(stick); }); }
window.addEventListener('pointerup', handlePointerEnd); window.addEventListener('pointercancel', handlePointerEnd); window.addEventListener('blur', () => Object.values(sticks).forEach(resetStick));

// ── Change 2: Floating Gamepad Card — Drag, Resize, Collapse ────────────────
// Bug 2 Fix: Use explicit display style instead of CSS class for collapse
(function() {
  const card = document.getElementById('gamepad-float-card');
  const titlebar = document.getElementById('gamepad-titlebar');
  const collapseBtn = document.getElementById('gamepad-collapse-btn');
  const cardBody = document.getElementById('gamepad-card-body');
  const resizeHandle = document.getElementById('gamepad-resize-handle');

  let isCollapsed = false;
  let savedCardWidth = null;
  let savedCardHeight = null;

  // ── Collapse / Expand ──
  collapseBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    isCollapsed = !isCollapsed;
    if (isCollapsed) {
      // Save current dimensions before collapsing
      savedCardWidth = card.style.width || null;
      savedCardHeight = card.style.height || null;
      // Explicitly hide the body using inline style (overrides any resize styles)
      cardBody.style.display = 'none';
      resizeHandle.style.display = 'none';
      // Clear card height so it shrinks to just titlebar
      card.style.height = 'auto';
      collapseBtn.textContent = '+';
    } else {
      // Restore display
      cardBody.style.display = '';
      resizeHandle.style.display = '';
      // Restore saved dimensions if they existed
      if (savedCardWidth) card.style.width = savedCardWidth;
      if (savedCardHeight) card.style.height = savedCardHeight;
      collapseBtn.textContent = '−';
    }
  });

  // ── Drag ──
  let isDragging = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;

  titlebar.addEventListener('pointerdown', (e) => {
    if (e.target === collapseBtn) return;
    isDragging = true;
    const rect = card.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;
    titlebar.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  titlebar.addEventListener('pointermove', (e) => {
    if (!isDragging) return;
    let newX = e.clientX - dragOffsetX;
    let newY = e.clientY - dragOffsetY;
    // Clamp to viewport
    newX = Math.max(0, Math.min(window.innerWidth - card.offsetWidth, newX));
    newY = Math.max(0, Math.min(window.innerHeight - 48, newY));
    // Switch from bottom/right positioning to top/left
    card.style.left = newX + 'px';
    card.style.top = newY + 'px';
    card.style.right = 'auto';
    card.style.bottom = 'auto';
  });

  titlebar.addEventListener('pointerup', () => { isDragging = false; });
  titlebar.addEventListener('pointercancel', () => { isDragging = false; });

  // ── Resize ──
  let isCardResizing = false;
  let resizeStartX = 0;
  let resizeStartY = 0;
  let resizeStartW = 0;
  let resizeStartH = 0;

  resizeHandle.addEventListener('pointerdown', (e) => {
    isCardResizing = true;
    resizeStartX = e.clientX;
    resizeStartY = e.clientY;
    resizeStartW = card.offsetWidth;
    resizeStartH = card.offsetHeight;
    resizeHandle.setPointerCapture(e.pointerId);
    e.preventDefault();
    e.stopPropagation();
  });

  resizeHandle.addEventListener('pointermove', (e) => {
    if (!isCardResizing) return;
    const dx = e.clientX - resizeStartX;
    const dy = e.clientY - resizeStartY;
    const newW = Math.max(260, resizeStartW + dx);
    const newH = Math.max(120, resizeStartH + dy);
    card.style.width = newW + 'px';
    card.style.height = newH + 'px';
  });

  resizeHandle.addEventListener('pointerup', () => { isCardResizing = false; });
  resizeHandle.addEventListener('pointercancel', () => { isCardResizing = false; });
})();

// ─── Boot ────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  loadInitialConfig();
  updateCode(codeEditor.value);
  runStaticAnalysis();
  Object.values(sticks).forEach(resetStick);
});
